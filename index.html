<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>fotn</title>
<meta name="description" content="fotn — presets photo inspirés des pellicules argentiques classiques, à appliquer et régler sur vos photos.">
<link rel="icon" type="image/svg+xml" href="icon.svg?v=4">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png?v=4">
<link rel="apple-touch-icon" href="apple-touch-icon.png?v=4">
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="fotn">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&display=swap">
<style>
:root{
  /* Monochrome — black / white / grey (colour lives only in the photos) */
  --bg:#000000; --bg2:#0c0c0c; --panel:#151515; --panel2:#1e1e1e;
  --line:#2a2a2a; --line2:#3a3a3a;
  --txt:#f4f4f4; --txt2:#aeaeae; --txt3:#8c8c8c;
  --accent:#ffffff; --accent2:#e6e6e6;   /* "accent" = the brightest neutral, for active/primary */
  --pos:#f0f0f0; --neg:#8a8a8a;
  --ink:#0a0a0a;            /* text/icon colour on the white accent */
  /* radius scale */
  --r-lg:16px;             /* cards, sheets */
  --r-md:11px;             /* inputs, buttons, panels, controls */
  --r-sm:7px;              /* badges, inner segments, small marks */
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-t:env(safe-area-inset-top,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%}
body{
  background:var(--bg); color:var(--txt);
  font-family:"Geist","Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:15px; line-height:1.45; -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
button{font-family:inherit;color:inherit;cursor:pointer;border:none;background:none}
input{font-family:inherit}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:var(--line2);border-radius:8px}
::-webkit-scrollbar-track{background:transparent}

/* ---------- HEADER ---------- */
.app{max-width:1320px;margin:0 auto;padding:0 16px}
header.top{
  position:sticky;top:0;z-index:40;
  padding-top:calc(var(--safe-t) + 14px);
  background:linear-gradient(180deg,var(--bg) 62%,rgba(0,0,0,0));
}
.brand{display:flex;align-items:center;gap:11px;margin-bottom:13px}
/* Branding — "fotn" SVG wordmark on the dark header. */
.logo{height:28px;width:auto;color:var(--accent);line-height:1;flex:none;display:block}
.brand h1{font-size:21px;font-weight:700;letter-spacing:-.01em;margin:0;line-height:1}
.count{margin-left:auto;font-size:11px;color:var(--txt3);text-align:right;flex:none}
.count b{color:var(--accent);font-weight:700}

.toolbar{display:flex;align-items:center;gap:10px;padding-bottom:12px}
.filters{display:flex;gap:8px;overflow-x:auto;flex:1;min-width:0;scrollbar-width:none;-ms-overflow-style:none}
.filters::-webkit-scrollbar{display:none}
.chip{
  flex:none;padding:7px 13px;border-radius:999px;font-size:13px;white-space:nowrap;
  background:var(--panel);border:1px solid var(--line);color:var(--txt2);transition:.15s;
}
.chip:hover{border-color:var(--line2)}
.chip.on{background:var(--txt);color:var(--ink);border-color:var(--txt);font-weight:600}

/* view-mode switch */
.viewseg{display:flex;flex:none;gap:2px;background:var(--panel);border:1px solid var(--line);border-radius:var(--r-md);padding:3px}
.viewseg button{width:32px;height:30px;border-radius:var(--r-sm);display:grid;place-items:center;color:var(--txt3);transition:.12s}
.viewseg button:hover{color:var(--txt2)}
.viewseg button.on{background:var(--panel2);color:var(--accent)}

/* ---------- GALLERY ---------- */
.gallery{padding:4px 0 40px}
.gallery.view-compact{display:grid;grid-template-columns:repeat(auto-fill,minmax(112px,1fr));gap:10px}
.gallery.view-large{display:grid;grid-template-columns:repeat(2,1fr);gap:13px}
.gallery.view-list{display:flex;flex-direction:column;gap:10px}
@media(min-width:560px){
  .gallery.view-compact{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}
  .gallery.view-large{gap:16px}
}
@media(min-width:880px){
  .gallery.view-compact{grid-template-columns:repeat(auto-fill,minmax(170px,1fr))}
}
/* list mode: horizontal row cards */
.view-list .card{flex-direction:row;align-items:stretch;border-radius:var(--r-md)}
.view-list .thumb{width:128px;flex:none;aspect-ratio:1/1}
.view-list .body{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;padding:12px 14px}
.view-list .card .name{-webkit-line-clamp:2;min-height:0;font-size:15px;margin-bottom:4px}
.view-list .card .sub{font-size:12px}
.view-list .thumb .badge:not(.mono){display:none}     /* clips on the narrow thumb; shown in body instead */
.lbase{display:none}
.view-list .lbase{display:block;font-size:11px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;color:var(--accent);margin-bottom:5px}
@media(min-width:560px){.view-list .thumb{width:160px}}

.loadmore-wrap{display:flex;justify-content:center;padding:8px 0 calc(var(--safe-b) + 96px)}
.loadmore{padding:11px 22px;border-radius:999px;background:var(--panel);border:1px solid var(--line2);
  color:var(--txt);font-size:13px;font-weight:600;transition:.15s}
.loadmore:hover{border-color:var(--accent);color:var(--accent)}
.loadmore[hidden]{display:none}
.card{
  background:var(--panel);border:1px solid var(--line);border-radius:var(--r-lg);
  overflow:hidden;cursor:pointer;transition:transform .18s cubic-bezier(.2,.7,.3,1),border-color .18s;
  display:flex;flex-direction:column;
}
.card:hover{transform:translateY(-3px);border-color:var(--line2)}
.card:active{transform:translateY(0) scale(.98)}
.thumb{aspect-ratio:5/4;position:relative;overflow:hidden;background:var(--panel)}
.thumb .ph{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
.badge{
  position:absolute;top:8px;left:8px;font-size:10px;font-weight:700;letter-spacing:.3px;
  padding:3px 7px;border-radius:var(--r-sm);background:rgba(0,0,0,.5);backdrop-filter:blur(6px);
  color:#fff;text-transform:uppercase;
}
.badge.mono{top:auto;bottom:8px;right:8px;left:auto;color:var(--accent)}
.fav{position:absolute;top:6px;right:6px;width:28px;height:28px;border-radius:50%;
  display:grid;place-items:center;background:rgba(0,0,0,.4);backdrop-filter:blur(6px);color:#fff;z-index:3;transition:background .15s,transform .15s}
.fav:hover{background:rgba(0,0,0,.65);transform:scale(1.08)}
.fav::before{content:"";position:absolute;inset:-8px}  /* ≥44px touch target */
.fav.on{color:var(--accent)}
.card .body{padding:10px 11px 12px}
.card .name{font-size:13px;font-weight:600;line-height:1.25;margin:0 0 3px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:34px}
.card .sub{font-size:11px;color:var(--txt3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.empty{text-align:center;color:var(--txt3);padding:60px 20px}

/* ---------- DETAIL / EDITOR ---------- */
.scrim{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(3px);opacity:0;
  pointer-events:none;transition:.25s;z-index:50}
.scrim.show{opacity:1;pointer-events:auto}
.editor{
  position:fixed;z-index:60;background:var(--bg2);
  display:flex;flex-direction:column;
  transition:transform .34s cubic-bezier(.2,.8,.2,1);
}
/* mobile: bottom sheet full */
.editor{left:0;right:0;bottom:0;top:0;transform:translateY(100%)}
.editor.open{transform:translateY(0)}
@media(min-width:880px){
  .editor{left:auto;top:0;bottom:0;width:520px;transform:translateX(100%);
    border-left:1px solid var(--line);box-shadow:-30px 0 60px -30px rgba(0,0,0,.6)}
  .editor.open{transform:translateX(0)}
}
.ed-head{display:flex;align-items:center;gap:12px;padding:calc(var(--safe-t) + 12px) 16px 12px;
  border-bottom:1px solid var(--line);flex:none}
.ed-head .x{position:relative;width:34px;height:34px;border-radius:var(--r-md);background:var(--panel2);display:grid;place-items:center;flex:none;transition:background .15s}
.ed-head .x:hover{background:var(--line2)}
.ed-head .x::before,.ed-head .hfav::before{content:"";position:absolute;inset:-5px}  /* ≥44px touch target */
.ed-head .t{min-width:0;flex:1}
.ed-head .t h2{margin:0;font-size:18px;font-weight:700;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ed-head .t span{font-size:11px;color:var(--txt3)}
.ed-head .hfav{position:relative;width:34px;height:34px;border-radius:var(--r-md);background:var(--panel2);display:grid;place-items:center;flex:none;transition:background .15s}
.ed-head .hfav:hover{background:var(--line2)}
.ed-head .hfav.on{color:var(--accent)}

/* pinned preview — full photo (contain), ~half the screen */
.preview{position:relative;width:100%;height:46vh;background:#000;overflow:hidden;flex:none}
.preview canvas{width:100%;height:100%;object-fit:contain;display:block}
@media(min-width:880px){.preview{height:300px}}
.pv-tools{position:absolute;left:10px;bottom:10px;display:flex;gap:8px;z-index:4}
.pv-btn{font-size:12px;padding:7px 11px;border-radius:var(--r-md);background:rgba(0,0,0,.5);backdrop-filter:blur(8px);
  color:#fff;display:flex;align-items:center;gap:6px;border:1px solid rgba(255,255,255,.16);transition:background .15s,border-color .15s}
.pv-btn:hover{background:rgba(0,0,0,.7);border-color:rgba(255,255,255,.3)}
.preview.cropping .pv-tools{display:none}

/* crop tool — ratio chips + adjustable box with rule-of-thirds */
.crop{position:absolute;inset:0;z-index:6;touch-action:none}
.crop[hidden]{display:none}
.crop-box{position:absolute;box-sizing:border-box;border:1px solid rgba(255,255,255,.95);
  box-shadow:0 0 0 9999px rgba(0,0,0,.55);cursor:move}
.crop-box::before,.crop-box::after{content:"";position:absolute;inset:0;pointer-events:none;opacity:.32}
.crop-box::before{background:
  linear-gradient(90deg,transparent calc(33.33% - .5px),#fff calc(33.33% - .5px),#fff calc(33.33% + .5px),transparent calc(33.33% + .5px)),
  linear-gradient(90deg,transparent calc(66.66% - .5px),#fff calc(66.66% - .5px),#fff calc(66.66% + .5px),transparent calc(66.66% + .5px))}
.crop-box::after{background:
  linear-gradient(0deg,transparent calc(33.33% - .5px),#fff calc(33.33% - .5px),#fff calc(33.33% + .5px),transparent calc(33.33% + .5px)),
  linear-gradient(0deg,transparent calc(66.66% - .5px),#fff calc(66.66% - .5px),#fff calc(66.66% + .5px),transparent calc(66.66% + .5px))}
.crop-h{position:absolute;width:30px;height:30px;z-index:2}
.crop-h::before{content:"";position:absolute;width:16px;height:16px;border:2px solid #fff;border-radius:1px}
.crop-h.tl{left:-15px;top:-15px}.crop-h.tl::before{left:0;top:0;border-right:none;border-bottom:none}
.crop-h.tr{right:-15px;top:-15px}.crop-h.tr::before{right:0;top:0;border-left:none;border-bottom:none}
.crop-h.bl{left:-15px;bottom:-15px}.crop-h.bl::before{left:0;bottom:0;border-right:none;border-top:none}
.crop-h.br{right:-15px;bottom:-15px}.crop-h.br::before{right:0;bottom:0;border-left:none;border-top:none}
.crop-bar{position:absolute;left:0;right:0;bottom:0;z-index:3;display:flex;align-items:center;gap:9px;
  padding:10px 12px calc(var(--safe-b)/2 + 10px);background:linear-gradient(0deg,rgba(0,0,0,.65),transparent)}
.crop-ratios{display:flex;gap:7px;overflow-x:auto;flex:1;min-width:0;scrollbar-width:none;-ms-overflow-style:none}
.crop-ratios::-webkit-scrollbar{display:none}
.crop-rchip{flex:none;padding:7px 12px;border-radius:999px;font-size:12px;font-weight:600;white-space:nowrap;
  color:#fff;background:rgba(0,0,0,.45);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.2)}
.crop-rchip.on{background:#fff;color:var(--ink);border-color:#fff}
.crop-ic{width:40px;height:40px;flex:none;border-radius:50%;display:grid;place-items:center;color:#fff;
  background:rgba(0,0,0,.45);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.2)}
.crop-ic.ok{background:#fff;color:var(--ink);border-color:#fff}

/* section tabs */
.tabs{display:flex;gap:4px;overflow-x:auto;flex:none;padding:9px 12px;border-bottom:1px solid var(--line);
  scrollbar-width:none;-ms-overflow-style:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:none;padding:8px 14px;border-radius:999px;font-size:13px;font-weight:600;color:var(--txt3);white-space:nowrap;transition:.12s}
.tab:hover{color:var(--txt2)}
.tab.on{background:var(--panel2);color:var(--accent)}

/* horizontally-swipeable panels — one section at a time, preview stays pinned */
.panels{flex:1;display:flex;overflow-x:auto;overflow-y:hidden;scroll-snap-type:x mandatory;
  scrollbar-width:none;-ms-overflow-style:none;-webkit-overflow-scrolling:touch}
.panels::-webkit-scrollbar{display:none}
.panel{flex:0 0 100%;width:100%;scroll-snap-align:start;overflow-y:auto;overscroll-behavior:contain;
  padding:16px 16px calc(var(--safe-b) + 16px)}

.sec-h{font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:var(--txt3);
  margin:14px 0 12px;font-weight:700;display:flex;align-items:center;gap:8px}
.sec-h .ln{flex:1;height:1px;background:var(--line)}

.basepick{display:flex;flex-wrap:wrap;gap:7px}
.basepick button{padding:8px 12px;border-radius:var(--r-md);background:var(--panel);border:1px solid var(--line);
  font-size:12px;color:var(--txt2);transition:border-color .15s,color .15s}
.basepick button:hover{border-color:var(--line2);color:var(--txt)}
.basepick button.on{background:var(--accent);color:var(--ink);border-color:var(--accent);font-weight:600}
.basepick button.on:hover{color:var(--ink)}

/* slider */
.sld{margin-bottom:18px}
.sld:last-child{margin-bottom:4px}
.sld-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px}
.sld-top label{font-size:13px;font-weight:500;color:var(--txt)}
.sld-val{font-variant-numeric:tabular-nums;font-weight:700;font-size:14px;min-width:42px;text-align:right}
.sld-val.pos{color:var(--pos)} .sld-val.neg{color:var(--neg)} .sld-val.zero{color:var(--txt3)}
.range{position:relative;height:26px;display:flex;align-items:center}
.range .track{position:absolute;left:0;right:0;height:4px;border-radius:3px;background:var(--line2)}
.range .midmark{position:absolute;top:50%;transform:translateY(-50%);width:1px;height:11px;background:var(--txt3);opacity:.6}
.range .fill{position:absolute;height:4px;border-radius:3px;background:var(--accent);opacity:.9}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;background:transparent;position:relative;z-index:2;margin:0;height:26px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;
  background:#fff;border:2px solid #0a0a0a;box-shadow:0 0 0 1px rgba(255,255,255,.25),0 2px 8px rgba(0,0,0,.5);cursor:grab}
input[type=range]::-webkit-slider-thumb:active{cursor:grabbing;transform:scale(1.12)}
input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:#fff;border:2px solid #0a0a0a}

/* segmented */
.seg-row{margin-bottom:16px}
.seg-row > label{font-size:13px;font-weight:500;display:block;margin-bottom:8px}
.seg{display:flex;gap:5px;background:var(--panel);padding:4px;border-radius:var(--r-md);border:1px solid var(--line)}
.seg button{flex:1;padding:8px 4px;border-radius:var(--r-sm);font-size:12px;color:var(--txt2);transition:.12s;font-weight:500}
.seg button:hover{color:var(--txt)}
.seg button.on{background:var(--panel2);color:var(--txt);box-shadow:0 1px 3px rgba(0,0,0,.3);font-weight:600}
.seg button.on.acc{background:var(--accent);color:var(--ink)}

.wbline{font-size:13px;color:var(--txt2);background:var(--panel);border:1px solid var(--line);
  border-radius:var(--r-md);padding:11px 13px;display:flex;justify-content:space-between;align-items:center}
.wbline b{color:var(--txt);font-weight:600}

.rawbox{background:var(--panel);border:1px solid var(--line);border-radius:var(--r-md);padding:13px 14px;
  font-size:12px;color:var(--txt2);white-space:pre-wrap;line-height:1.6;font-family:ui-monospace,Menlo,monospace}

.ed-foot{flex:none;display:flex;gap:10px;padding:12px 16px calc(var(--safe-b) + 14px);
  border-top:1px solid var(--line);background:var(--bg2)}
.ed-foot button{flex:1;padding:13px;border-radius:var(--r-md);font-weight:600;font-size:14px;transition:filter .15s,background .15s}
.btn-reset{background:var(--panel2);border:1px solid var(--line2);color:var(--txt)}
.btn-reset:hover{background:var(--line2)}
.btn-export{background:var(--accent2);color:var(--ink);display:flex;align-items:center;justify-content:center}
.btn-export:hover{filter:brightness(1.08)}
.btn-export.busy{opacity:.6;pointer-events:none}
.btn-export[hidden]{display:none}

.toast{position:fixed;bottom:calc(var(--safe-b) + 22px);left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--accent);color:var(--ink);padding:11px 18px;border-radius:var(--r-md);font-size:13px;font-weight:600;
  z-index:100;opacity:0;transition:.25s;box-shadow:0 10px 30px rgba(0,0,0,.5)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* editor preset strip — VSCO-style filter row: switch the look on your own photo */
.ed-strip{display:flex;gap:11px;overflow-x:auto;flex:none;padding:12px 16px;
  border-bottom:1px solid var(--line);background:var(--bg2);
  scrollbar-width:none;-ms-overflow-style:none}
.ed-strip::-webkit-scrollbar{display:none}
.pchip{flex:none;display:flex;flex-direction:column;align-items:center;gap:7px;width:60px;cursor:pointer;
  background:none;padding:0}
.pchip canvas{width:56px;height:56px;border-radius:var(--r-md);display:block;background:var(--panel);
  border:2px solid var(--line);transition:border-color .15s,transform .15s}
.pchip:hover canvas{transform:translateY(-2px);border-color:var(--line2)}
.pchip.on canvas{border-color:var(--accent)}
.pchip:active canvas{transform:translateY(0) scale(.96)}
.pchip span{font-size:10px;line-height:1.2;color:var(--txt3);max-width:60px;text-align:center;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color .15s}
.pchip.on span{color:var(--accent);font-weight:600}

.fabs{position:fixed;right:16px;bottom:calc(var(--safe-b) + 16px);z-index:30;display:flex;flex-direction:column;align-items:center;gap:10px}
.fab{width:52px;height:52px;border-radius:50%;background:var(--accent);color:var(--ink);
  display:grid;place-items:center;box-shadow:0 8px 24px -6px rgba(0,0,0,.7);transition:transform .15s,filter .15s}
.fab:hover{transform:translateY(-2px);filter:brightness(1.06)}
.fab:active{transform:translateY(0)}
.fab.sec{background:var(--panel2);color:var(--txt);border:1px solid var(--line2);box-shadow:0 6px 18px rgba(0,0,0,.4);width:46px;height:46px}
.fab.sec:hover{background:var(--line2);filter:none}

/* keyboard focus — one consistent ring everywhere */
:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
button:focus-visible,input:focus-visible,a:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:var(--r-sm)}

@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;
    transition-duration:.001ms!important;scroll-behavior:auto!important}
}
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="brand">
      <svg class="logo" viewBox="0 0 196 86" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="fotn">

<script>
//// ---------- MATERIAL DESIGN ICONS (Apache 2.0) ----------
const MI={
  heart:'M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z',
  heartO:'M16.5 3c-1.74 0-3.41.81-4.5 2.09C10.91 3.81 9.24 3 7.5 3 4.42 3 2 5.42 2 8.5c0 3.78 3.4 6.86 8.55 11.54L12 21.35l1.45-1.32C18.6 15.36 22 12.28 22 8.5 22 5.42 19.58 3 16.5 3zm-4.4 15.55l-.1.1-.1-.1C7.14 14.24 4 11.39 4 8.5 4 6.5 5.5 5 7.5 5c1.54 0 3.04.99 3.57 2.36h1.87C13.46 5.99 14.96 5 16.5 5c2 0 3.5 1.5 3.5 3.5 0 2.89-3.14 5.74-7.9 10.05z',

  add:'M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z',
  image:'M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z',
  download:'M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z',
};
// inline material svg
function svgIcon(path,size){return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="${path}"></path></svg>`;}
// favorite heart that swaps filled/outline by state
function heartSvg(on,size){return svgIcon(on?MI.heart:MI.heartO,size);}
function setHeart(btn,on){if(!btn)return;const p=btn.querySelector('path');if(p)p.setAttribute('d',on?MI.heart:MI.heartO);btn.setAttribute('aria-pressed',!!on);}

// Turn a container of role=radio buttons into a keyboard radiogroup:
// roving tabindex + arrow/Home/End navigation (selection follows focus).
function wireRadios(group){
  const radios=[...group.querySelectorAll('[role=radio]')];
  if(!radios.length)return;
  let ci=radios.findIndex(b=>b.getAttribute('aria-checked')==='true');
  if(ci<0)ci=0;
  radios.forEach((b,i)=>b.tabIndex=i===ci?0:-1);
  const rg=group.getAttribute('data-rg');
  group.onkeydown=e=>{
    const i=radios.indexOf(document.activeElement);if(i<0)return;
    let n=null;const k=e.key;
    if(k==='ArrowRight'||k==='ArrowDown')n=(i+1)%radios.length;
    else if(k==='ArrowLeft'||k==='ArrowUp')n=(i-1+radios.length)%radios.length;
    else if(k==='Home')n=0;else if(k==='End')n=radios.length-1;else return;
    e.preventDefault();
    const val=radios[n].getAttribute('data-rv');
    radios[n].click();                 // selects -> rebuilds the group(s)
    const sel=document.querySelector(`[data-rg="${rg}"] [data-rv="${val}"]`);
    if(sel)sel.focus();
  };
}

//// ---------- PREVIEW IMAGES ----------
// Generic royalty-free photo (served alongside the app) used on cards + as default preview.
const GENERIC_IMG='generic.jpg?v=2';
const baseImg=new Image();let baseReady=false;
baseImg.onload=()=>{baseReady=true;rerenderCards();};
baseImg.src=GENERIC_IMG;
function clamp(x,a,b){return x<a?a:x>b?b:x;}
function lerp(a,b,t){return a+(b-a)*t;}

//// ---------- 3D LUT CACHE ----------
// Each film look is a Hald-CLUT PNG (125×125 = 25³ nodes) baked in Lightroom.
// Load it once into a Float32 cube; renderRecipe samples it trilinearly.
const LUT_N=25;
const LUTS={};
let lutRepaintScheduled=false;
function onLutReady(){
  if(lutRepaintScheduled)return;lutRepaintScheduled=true;
  requestAnimationFrame(()=>{lutRepaintScheduled=false;
    rerenderCards();
    if($('#editor').classList.contains('open')){paintEditStrip();paint();}
  });
}
function loadLUT(file){
  if(LUTS[file])return LUTS[file];
  const o={ready:false,data:null,n:LUT_N,img:new Image()};
  LUTS[file]=o;
  o.img.onload=()=>{
    const N=LUT_N, side=125;   // 125×125 image = N√N per side, one pixel per node
    const c=document.createElement('canvas');c.width=side;c.height=side;
    const cx=c.getContext('2d',{willReadFrequently:true});cx.drawImage(o.img,0,0,side,side);
    const d=cx.getImageData(0,0,side,side).data;
    const data=new Float32Array(N*N*N*3);
    for(let i=0;i<N*N*N;i++){
      const r=i%N, g=((i/N)|0)%N, b=(i/(N*N))|0;
      const px=i%side, py=(i/side)|0, off=(py*side+px)*4;
      const ci=(b*N*N+g*N+r)*3;
      data[ci]=d[off]/255; data[ci+1]=d[off+1]/255; data[ci+2]=d[off+2]/255;
    }
    o.data=data;o.ready=true;onLutReady();
  };
  o.img.onerror=()=>{};
  o.img.src=file;
  return o;
}

//// ====================================================================
//// FILM ENGINE — real per-pixel reinterpretation of each Fuji recipe.
//// Pipeline / pixel: White Balance -> simulation colour matrix -> saturation
//// (+ Colour Chrome) -> split-tone -> contrast -> highlight/shadow tone
//// -> matte lift -> mono+toning -> grain -> vignette.
//// Same engine drives the cards, the editor preview and the export.
//// ====================================================================

// Per-simulation colour science (artistic approximations of each film sim).
// mx = 3x3 channel matrix; sat/con base; lift = matte black raise;
// split = split-tone strength with sh (shadow) / hi (highlight) colour vectors.
const I3=[1,0,0, 0,1,0, 0,0,1];

// ---------------------------------------------------------------------------
// PRESET LIBRARY — original film-inspired looks (LUTs), each with character.
// Fields: temp(warmth -100..100) tint(+magenta/-green) sat con mx(3x3)
//   split + splitS(shadow rgb) splitH(highlight rgb)  lift(matte)  grain  vig
//   mono + filt(mono weights) + tone(mono toning rgb).  cat = badge family.
// Inspired by documented stocks (warm portrait/consumer negatives, vivid
// slides, motion-picture stocks, lomo/cross-process, faded vintage, B&W).
// ---------------------------------------------------------------------------
// LUT-based film looks — real 3D LUTs baked from the Analog Vision Studio V2
// "Frontier" Lightroom profiles (one PNG Hald per stock, applied trilinearly).
// The LUT carries the whole colour; universal sliders layer on top.
const PRESETS=[
 // — Négatifs couleur —
 {name:'Portra 400',    film:'Négatif portrait · Frontier',  cat:'Négatif', lut:'luts/portra400.png'},
 {name:'Pro 400H',      film:'Négatif pro · Frontier',       cat:'Négatif', lut:'luts/pro400h.png'},
 {name:'Gold 200',      film:'Négatif doré · Frontier',      cat:'Négatif', lut:'luts/gold200.png'},
 {name:'ColorPlus 200', film:'Négatif du quotidien · Frontier', cat:'Négatif', lut:'luts/colorplus200.png'},
 {name:'Kodacolor 100', film:'Négatif grain fin · Frontier', cat:'Négatif', lut:'luts/kodacolor100.png'},
 {name:'UltraMax 400',  film:'Négatif polyvalent · Frontier',cat:'Négatif', lut:'luts/ultramax400.png'},
 // — Diapositive —
 {name:'Velvia 100',    film:'Diapo saturée · Frontier',     cat:'Diapo',   lut:'luts/velvia100.png'},
 // — Noir & blanc —
 {name:'HP5+',          film:'N&B classique · Frontier',     cat:'N&B', mono:1, lut:'luts/hp5.png'},
];
PRESETS.forEach(p=>{p.mono=!!p.mono;});
// neutral user adjustments (cards render presets at their default look)
const NEUTRAL={};

// Merge a preset (P) with live user adjustments (A) into per-pixel constants.
// k = preset intensity (0..1): scales the PRESET toward neutral, while the
// universal user adjustments always apply at full strength.
function buildOps(P,A){
  A=A||NEUTRAL;
  const k=(A.intensity==null?100:A.intensity)/100;
  const L=P.lut?LUTS[P.lut]:null, lutReady=!!(L&&L.ready);   // the film look is a 3D LUT
  const warm=((P.temp||0)*k+(A.temperature||0))/100;
  const grn =((P.tint||0)*k+(A.tint||0))/100;
  const rG=1+0.22*warm, bG=1-0.22*warm, gG=1-0.10*grn;
  const exp=1+(A.exposure||0)/100*0.55;
  const pSat=P.mono?1:lerp(1,(P.sat==null?1:P.sat),k);      // mono keeps colour for the blend
  const sat=Math.max(0,pSat*(1+(A.saturation||0)/100));
  const con=lerp(1,(P.con==null?1:P.con),k)*(1+(A.contrast||0)/100*0.6);
  const hi=(A.highlights||0)/100*4;
  const sh=(A.shadows||0)/100*4;
  const lift=clamp((P.lift||0)*k+(A.fade||0)/100*0.45,0,0.7);
  const grain=clamp((P.grain||0)*k+(A.grain||0)/100*2,0,3);
  const vig=clamp((P.vig||0)*k+(A.vignette||0)/100*0.55,0,0.85);
  const baseMx=P.mx||I3, mx=baseMx===I3?I3:baseMx.map((v,i)=>lerp(I3[i],v,k));
  return {rG,gG,bG,exp,sat,con,hi,sh,lift,grain,vig,
    split:(P.split||0)*k, splitS:P.splitS||[0,0,0], splitH:P.splitH||[0,0,0],
    mx,
    lut:lutReady?L.data:null, lutN:lutReady?L.n:LUT_N, lutK:k,   // LUT applied first, blended by intensity
    mono:(!!P.mono)&&!P.lut, monoK:k, filt:P.filt||[0.30,0.59,0.11], tone:P.tone||null};
}

// Cover-draw an image into a w×h context (object-fit: cover).
function drawCover(ctx,img,w,h){
  const iw=img.naturalWidth||img.videoWidth||img.width||w, ih=img.naturalHeight||img.videoHeight||img.height||h;
  const s=Math.max(w/iw,h/ih), dw=iw*s, dh=ih*s;
  ctx.drawImage(img,(w-dw)/2,(h-dh)/2,dw,dh);
}

// Render a preset (+ live adjustments) onto a canvas at w×h from a source image.
// opts.mirror flips horizontally (selfie); opts.noGrain skips grain (live feed).
function renderRecipe(src,P,A,canvas,w,h,opts){
  canvas.width=w;canvas.height=h;
  const ctx=canvas.getContext('2d',{willReadFrequently:true});
  const ready=src&&(src.naturalWidth||src.videoWidth||src.width);
  if(!ready){ctx.fillStyle='#151515';ctx.fillRect(0,0,w,h);return;}
  if(opts&&opts.crop){const c=opts.crop;ctx.drawImage(src,c.sx,c.sy,c.sw,c.sh,0,0,w,h);}
  else if(opts&&opts.mirror){ctx.save();ctx.translate(w,0);ctx.scale(-1,1);drawCover(ctx,src,w,h);ctx.restore();}
  else drawCover(ctx,src,w,h);
  const id=ctx.getImageData(0,0,w,h),d=id.data;
  const O=buildOps(P,A);
  const mx=O.mx, cx=w/2, cy=h/2, maxd=Math.sqrt(cx*cx+cy*cy);
  const LD=O.lut, LN=O.lutN, LN1=O.lutN-1, LNN=O.lutN*O.lutN, LK=O.lutK;   // LUT locals
  let p=0;
  for(let y=0;y<h;y++){
    for(let x=0;x<w;x++,p+=4){
      let r=d[p]/255, g=d[p+1]/255, b=d[p+2]/255;
      // 0. film LUT (trilinear) — the whole look, blended by intensity
      if(LD){
        let fr=r<0?0:r>1?1:r, fg=g<0?0:g>1?1:g, fb=b<0?0:b>1?1:b;
        fr*=LN1; fg*=LN1; fb*=LN1;
        const r0=fr|0, g0=fg|0, b0=fb|0;
        const r1=r0<LN1?r0+1:r0, g1=g0<LN1?g0+1:g0, b1=b0<LN1?b0+1:b0;
        const dr=fr-r0, dg=fg-g0, db=fb-b0, mr=1-dr, mg=1-dg, mb=1-db;
        const w000=mr*mg*mb, w100=dr*mg*mb, w010=mr*dg*mb, w110=dr*dg*mb,
              w001=mr*mg*db, w101=dr*mg*db, w011=mr*dg*db, w111=dr*dg*db;
        const o000=(b0*LNN+g0*LN+r0)*3, o100=(b0*LNN+g0*LN+r1)*3,
              o010=(b0*LNN+g1*LN+r0)*3, o110=(b0*LNN+g1*LN+r1)*3,
              o001=(b1*LNN+g0*LN+r0)*3, o101=(b1*LNN+g0*LN+r1)*3,
              o011=(b1*LNN+g1*LN+r0)*3, o111=(b1*LNN+g1*LN+r1)*3;
        const lr=LD[o000]*w000+LD[o100]*w100+LD[o010]*w010+LD[o110]*w110+LD[o001]*w001+LD[o101]*w101+LD[o011]*w011+LD[o111]*w111;
        const lg=LD[o000+1]*w000+LD[o100+1]*w100+LD[o010+1]*w010+LD[o110+1]*w110+LD[o001+1]*w001+LD[o101+1]*w101+LD[o011+1]*w011+LD[o111+1]*w111;
        const lb=LD[o000+2]*w000+LD[o100+2]*w100+LD[o010+2]*w010+LD[o110+2]*w110+LD[o001+2]*w001+LD[o101+2]*w101+LD[o011+2]*w011+LD[o111+2]*w111;
        r+=(lr-r)*LK; g+=(lg-g)*LK; b+=(lb-b)*LK;
      }
      // 1. exposure + white balance
      r*=O.rG*O.exp; g*=O.gG*O.exp; b*=O.bG*O.exp;
      // 2. film colour matrix
      let nr=r*mx[0]+g*mx[1]+b*mx[2];
      let ng=r*mx[3]+g*mx[4]+b*mx[5];
      let nb=r*mx[6]+g*mx[7]+b*mx[8];
      r=nr;g=ng;b=nb;
      let lum=0.299*r+0.587*g+0.114*b;
      // 3. saturation
      r=lum+(r-lum)*O.sat; g=lum+(g-lum)*O.sat; b=lum+(b-lum)*O.sat;
      // 4. split-tone (shadows / highlights)
      if(O.split){
        const sF=lum<0.5?(0.5-lum)*2:0, hF=lum>0.5?(lum-0.5)*2:0, sp=O.split;
        r+=(O.splitS[0]*sF+O.splitH[0]*hF)*sp; g+=(O.splitS[1]*sF+O.splitH[1]*hF)*sp; b+=(O.splitS[2]*sF+O.splitH[2]*hF)*sp;
      }
      // 5. contrast (pivot 0.5)
      r=(r-0.5)*O.con+0.5; g=(g-0.5)*O.con+0.5; b=(b-0.5)*O.con+0.5;
      // 6. highlight / shadow tone
      lum=0.299*r+0.587*g+0.114*b;
      if(O.hi&&lum>0.45){const f=(lum-0.45)/0.55*O.hi*0.028;r+=f;g+=f;b+=f;}
      if(O.sh&&lum<0.55){const f=(0.55-lum)/0.55*O.sh*0.028;r-=f;g-=f;b-=f;}
      // 7. matte / fade
      if(O.lift){const L=O.lift;r=L+r*(1-L);g=L+g*(1-L);b=L+b*(1-L);}
      // 8. mono + toning (blended toward colour by preset intensity)
      if(O.mono){
        const yv=O.filt[0]*r+O.filt[1]*g+O.filt[2]*b, k=O.monoK;
        let mr,mg,mb;
        if(O.tone){mr=yv+O.tone[0];mg=yv+O.tone[1];mb=yv+O.tone[2];}
        else{mr=mg=mb=yv;}
        r=r+(mr-r)*k; g=g+(mg-g)*k; b=b+(mb-b)*k;
      }
      // 9. grain (luminance noise) — skipped on the live feed
      if(O.grain&&!(opts&&opts.noGrain)){const n=(Math.random()-0.5)*O.grain*0.05;r+=n;g+=n;b+=n;}
      // 10. vignette
      if(O.vig){const dx=x-cx,dy=y-cy,dd=Math.sqrt(dx*dx+dy*dy)/maxd;
        if(dd>0.55){const vf=1-(dd-0.55)/0.45*O.vig;r*=vf;g*=vf;b*=vf;}}
      d[p]=r<0?0:r>1?255:r*255;
      d[p+1]=g<0?0:g>1?255:g*255;
      d[p+2]=b<0?0:b>1?255:b*255;
    }
  }
  ctx.putImageData(id,0,0);
}

//// ---------- STATE ----------
let RECIPES=[], FILTERED=[], rendered=0;
let VIEW=['compact','large','list'].includes(localStorage.getItem('fudge_view'))?localStorage.getItem('fudge_view'):'large';
let cur=null;            // recipe being edited
let vals={};             // live control values
let userImg=null;        // uploaded image data url
let cropN=null;          // applied crop {x,y,w,h} normalised to the image, or null = full
let cropMode=false, cropDraft=null, cropARn=null, cropARkey='free';
const favs=new Set(JSON.parse(localStorage.getItem('fuji_favs')||'[]'));
const filterState={mono:'all', fav:false};

const $=s=>document.querySelector(s);
const el=(t,c)=>{const e=document.createElement(t);if(c)e.className=c;return e;};

//// ---------- LOAD ----------
RECIPES=PRESETS.map((p,i)=>{p._i=i;return p;});
RECIPES.forEach(p=>{if(p.lut)loadLUT(p.lut);});   // warm the LUT cache (small Hald PNGs)
buildFilters();
applyFilters();

//// ---------- FILTER BAR ----------
function buildFilters(){
  const wrap=$('#filters');wrap.innerHTML='';
  const mk=(label,on,fn)=>{const b=el('button','chip');b.textContent=label;if(on)b.classList.add('on');b.setAttribute('aria-pressed',on?'true':'false');b.onclick=fn;return b;};
  wrap.appendChild(mk('Favoris', filterState.fav,()=>{filterState.fav=!filterState.fav;buildFilters();applyFilters();}));
  wrap.appendChild(mk('Couleur', filterState.mono==='color',()=>{filterState.mono=filterState.mono==='color'?'all':'color';buildFilters();applyFilters();}));
  wrap.appendChild(mk('Noir & blanc', filterState.mono==='bw',()=>{filterState.mono=filterState.mono==='bw'?'all':'bw';buildFilters();applyFilters();}));
}

function applyFilters(){
  FILTERED=RECIPES.filter(r=>{
    if(filterState.fav && !favs.has(r._i)) return false;
    if(filterState.mono==='color' && r.mono) return false;
    if(filterState.mono==='bw' && !r.mono) return false;
    return true;
  });
  rendered=0;$('#gallery').innerHTML='';
  if(!FILTERED.length){$('#gallery').innerHTML='<div class="empty">Aucune recette trouvée 🎞️</div>';$('#loadMore').hidden=true;return;}
  renderMore();
}

//// ---------- GALLERY RENDER (load-more, 3 view modes) ----------
function cardDims(){return VIEW==='large'?[480,384]:VIEW==='list'?[320,240]:[260,208];}
function pageSize(){return VIEW==='compact'?36:12;}
function card(r){
  const c=el('div','card');
  c.tabIndex=0;c.setAttribute('role','button');
  c.setAttribute('aria-label',`Ouvrir le preset ${r.name||''} · ${r.cat||''}`);
  c.onclick=()=>openEditor(r);
  c.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();openEditor(r);}};
  const fav=favs.has(r._i);
  const [w,h]=cardDims();
  c.innerHTML=`
    <div class="thumb">
      <canvas class="ph" data-ri="${r._i}" width="${w}" height="${h}" aria-hidden="true"></canvas>
      <span class="badge">${esc(r.cat||'')}</span>
      ${r.mono?'<span class="badge mono">N&B</span>':''}
      <button class="fav ${fav?'on':''}" data-i="${r._i}" aria-label="Ajouter aux favoris" aria-pressed="${fav}">${heartSvg(fav,16)}</button>
    </div>
    <div class="body">
      <div class="lbase">${esc(r.cat||'')}</div>
      <p class="name">${esc(r.name||'')}</p>
      <div class="sub">${esc(r.film||'')}</div>
    </div>`;
  c.querySelector('.fav').onclick=(e)=>{e.stopPropagation();toggleFav(r._i,e.currentTarget);};
  const cv=c.querySelector('canvas');
  if(baseReady)renderRecipe(baseImg,r,NEUTRAL,cv,w,h);
  return c;
}
// (Re)paint every card thumbnail (after the image loads, or on view change).
function rerenderCards(){
  if(!baseReady)return;const [w,h]=cardDims();
  document.querySelectorAll('.thumb canvas[data-ri]').forEach(cv=>{
    const r=RECIPES[+cv.dataset.ri]; if(r)renderRecipe(baseImg,r,NEUTRAL,cv,w,h);
  });
}
function renderMore(){
  const g=$('#gallery');const frag=document.createDocumentFragment();
  const end=Math.min(rendered+pageSize(),FILTERED.length);
  for(let i=rendered;i<end;i++)frag.appendChild(card(FILTERED[i]));
  g.appendChild(frag);rendered=end;updateLoadMore();
}
function updateLoadMore(){
  const btn=$('#loadMore');const rem=FILTERED.length-rendered;
  if(rem>0){btn.hidden=false;btn.textContent=`Charger plus · ${rem} restantes`;}
  else btn.hidden=true;
}
$('#loadMore').onclick=renderMore;

//// ---------- VIEW MODE ----------
function setView(v){
  if(!['compact','large','list'].includes(v))v='large';
  VIEW=v;localStorage.setItem('fudge_view',v);
  $('#gallery').className='gallery view-'+v;
  document.querySelectorAll('#viewToggle button').forEach(b=>{
    const on=b.dataset.v===v;b.classList.toggle('on',on);b.setAttribute('aria-checked',on?'true':'false');b.tabIndex=on?0:-1;
  });
  rendered=0;$('#gallery').innerHTML='';renderMore();   // re-render so canvases match the new size
}
(function initViewToggle(){
  const vt=$('#viewToggle');vt.setAttribute('data-rg','view');
  vt.querySelectorAll('button').forEach(b=>{b.setAttribute('role','radio');b.setAttribute('data-rv',b.dataset.v);b.onclick=()=>setView(b.dataset.v);});
  setView(VIEW);
  wireRadios(vt);
})();

function esc(s){return (s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}

//// ---------- FAVORITES ----------
function toggleFav(i,btn){
  if(favs.has(i))favs.delete(i);else favs.add(i);
  localStorage.setItem('fuji_favs',JSON.stringify([...favs]));
  if(btn){const on=favs.has(i);btn.classList.toggle('on',on);setHeart(btn,on);}
}
$('#fabFav').onclick=()=>{filterState.fav=!filterState.fav;buildFilters();applyFilters();
  $('#fabFav').setAttribute('aria-pressed',filterState.fav?'true':'false');
  toast(filterState.fav?'Favoris seulement':'Toutes les recettes');};

//// ---------- EDITOR ----------
// Universal photo adjustments layered on top of the chosen preset (neutral = 0).
const ADJ=[
  {k:'exposure',   label:'Exposition',     min:-100,max:100,step:1},
  {k:'contrast',   label:'Contraste',      min:-100,max:100,step:1},
  {k:'highlights', label:'Hautes lumières',min:-100,max:100,step:1},
  {k:'shadows',    label:'Ombres',         min:-100,max:100,step:1},
  {k:'saturation', label:'Saturation',     min:-100,max:100,step:1},
  {k:'temperature',label:'Température',     min:-100,max:100,step:1},
  {k:'tint',       label:'Teinte',         min:-100,max:100,step:1},
  {k:'intensity',  label:'Intensité',      min:0,   max:100,step:1,def:100},
  {k:'grain',      label:'Grain',          min:0,   max:100,step:1},
  {k:'vignette',   label:'Vignettage',     min:0,   max:100,step:1},
  {k:'fade',       label:'Estompé',        min:0,   max:100,step:1},
];
function neutralAdj(){const o={};ADJ.forEach(a=>o[a.k]=(a.def==null?0:a.def));return o;}

let lastPreset=null;        // last look opened — reused when capturing/importing a photo
function openEditor(r){
  cur=r;lastPreset=r;
  vals=neutralAdj();cropN=null;
  $('#edName').textContent=r.name||'';
  $('#edSub').textContent=r.film||'';
  syncFav();
  buildEditorPanels();
  buildEditStrip();
  paint();
  document.body.style.overflow='hidden';
  // a11y: remember focus origin, neutralise background, move focus into the dialog
  lastFocused=document.activeElement;
  bgInert(true);
  $('#scrim').classList.add('show');$('#editor').classList.add('open');
  $('#edClose').focus();
  setTimeout(()=>{if(!$('#editor').contains(document.activeElement))$('#edClose').focus();},60);
}
let lastFocused=null;
function bgInert(on){['.app','.fabs'].forEach(s=>{const n=document.querySelector(s);if(n){if(on)n.setAttribute('inert','');else n.removeAttribute('inert');}});}
function closeEditor(){if(cropMode)exitCrop();$('#scrim').classList.remove('show');$('#editor').classList.remove('open');
  document.body.style.overflow='';cur=null;
  bgInert(false);
  if(lastFocused&&lastFocused.focus){lastFocused.focus();}lastFocused=null;}
$('#edClose').onclick=closeEditor;$('#scrim').onclick=closeEditor;

function syncFav(){const on=cur&&favs.has(cur._i);const b=$('#edFav');
  b.classList.toggle('on',!!on);setHeart(b,!!on);}
$('#edFav').onclick=()=>{if(!cur)return;toggleFav(cur._i);syncFav();
  document.querySelectorAll(`.fav[data-i="${cur._i}"]`).forEach(b=>{const on=favs.has(cur._i);b.classList.toggle('on',on);setHeart(b,on);});};

//// ---------- EDITOR PRESET STRIP (VSCO-style: switch the look on your photo) ----------
// Each chip previews the preset on the current photo (or the reference image).
function buildEditStrip(){
  const wrap=$('#edStrip');if(!wrap)return;wrap.innerHTML='';
  const frag=document.createDocumentFragment();
  RECIPES.forEach(p=>{
    const b=el('button','pchip');b.dataset.i=p._i;
    b.setAttribute('role','option');b.setAttribute('aria-label',p.name||'');
    const cv=el('canvas');cv.width=112;cv.height=112;cv.setAttribute('aria-hidden','true');
    const sp=el('span');sp.textContent=p.name||'';
    b.appendChild(cv);b.appendChild(sp);
    b.onclick=()=>selectPreset(p);
    frag.appendChild(b);
  });
  wrap.appendChild(frag);
  markEditStrip();
  paintEditStrip();      // thumbnails (deferred so the open animation stays smooth)
}
let stripScheduled=false;
function paintEditStrip(){
  if(stripScheduled)return;stripScheduled=true;
  requestAnimationFrame(()=>{stripScheduled=false;
    const src=userImg||baseImg;
    if(!src||!(src.naturalWidth||src.width))return;
    document.querySelectorAll('#edStrip .pchip canvas').forEach(cv=>{
      const p=RECIPES[+cv.parentNode.dataset.i];if(p)renderRecipe(src,p,NEUTRAL,cv,112,112);
    });
  });
}
function markEditStrip(){
  document.querySelectorAll('#edStrip .pchip').forEach(c=>{
    const on=cur&&+c.dataset.i===cur._i;
    c.classList.toggle('on',on);c.setAttribute('aria-selected',on?'true':'false');
    if(on)c.scrollIntoView({inline:'center',block:'nearest'});
  });
}
// Switch preset inside the editor — keeps the user's manual adjustments.
function selectPreset(p){
  if(!p)return;cur=p;lastPreset=p;
  $('#edName').textContent=p.name||'';$('#edSub').textContent=p.film||'';
  syncFav();markEditStrip();paint();
}

//// ---------- EDITOR PANELS (tabs + horizontal swipe) ----------
const SLIDER_BY_K=Object.fromEntries(ADJ.map(s=>[s.k,s]));
const ED_PANELS=[
  {id:'light', label:'Lumière', sliders:['exposure','contrast','highlights','shadows']},
  {id:'color', label:'Couleur', sliders:['saturation','temperature','tint']},
  {id:'fx',    label:'Rendu',   sliders:['intensity','grain','vignette','fade']},
];
let curTab=0;

function makeSlider(s){
  const row=el('div','sld');
  row.innerHTML=`<div class="sld-top"><label for="i_${s.k}">${s.label}</label><span class="sld-val" id="v_${s.k}" aria-hidden="true"></span></div>
    <div class="range"><div class="track"></div><div class="midmark"></div><div class="fill" id="f_${s.k}"></div>
    <input type="range" min="${s.min}" max="${s.max}" step="${s.step}" value="${vals[s.k]}" id="i_${s.k}"></div>`;
  const inp=row.querySelector('input');
  inp.addEventListener('input',()=>{vals[s.k]=parseFloat(inp.value);updSlider(s);paintLook();});
  return row;
}
function fillPanel(id){
  const cfg=ED_PANELS.find(p=>p.id===id);const host=document.getElementById('panel-'+id);
  host.innerHTML='';
  (cfg.sliders||[]).forEach(k=>host.appendChild(makeSlider(SLIDER_BY_K[k])));
  (cfg.sliders||[]).forEach(k=>updSlider(SLIDER_BY_K[k]));
}
function buildTabs(){
  const t=$('#edTabs');t.innerHTML='';
  ED_PANELS.forEach((p,i)=>{const b=el('button','tab');b.textContent=p.label;b.setAttribute('role','tab');b.dataset.i=i;
    b.setAttribute('aria-controls','panel-'+p.id);b.onclick=()=>setTab(i);t.appendChild(b);});
}
function highlightTab(i){
  document.querySelectorAll('#edTabs .tab').forEach((b,j)=>{const on=j===i;b.classList.toggle('on',on);
    b.setAttribute('aria-selected',on?'true':'false');b.tabIndex=on?0:-1;});
}
function setTab(i,smooth=true){
  i=clamp(i,0,ED_PANELS.length-1);curTab=i;
  const p=$('#edPanels');const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  p.scrollTo({left:i*p.clientWidth,behavior:(smooth&&!reduce)?'smooth':'auto'});
  highlightTab(i);
}
function buildEditorPanels(){
  buildTabs();
  ED_PANELS.forEach(p=>fillPanel(p.id));
  setTab(0,false);
}
// sync active tab while swiping; arrow-key tab navigation
(function initTabs(){
  const p=$('#edPanels');let raf;
  p.addEventListener('scroll',()=>{if(raf)return;raf=requestAnimationFrame(()=>{raf=null;
    const i=Math.round(p.scrollLeft/p.clientWidth);if(i!==curTab){curTab=i;highlightTab(i);}});});
  $('#edTabs').addEventListener('keydown',e=>{
    if(e.key==='ArrowRight'){e.preventDefault();setTab(curTab+1);}
    else if(e.key==='ArrowLeft'){e.preventDefault();setTab(curTab-1);}
    else return;
    const b=document.querySelector('#edTabs .tab.on');if(b)b.focus();
  });
})();
function updSlider(s){
  const v=vals[s.k];const span=$('#v_'+s.k);
  const num=(Number.isInteger(v)?v:v.toFixed(1));
  const txt=(s.min<0&&v>0?'+':'')+num;        // sign only on bipolar sliders
  span.textContent=txt;
  span.className='sld-val '+(v>0?'pos':v<0?'neg':'zero');
  $('#i_'+s.k).setAttribute('aria-valuetext',txt);   // a11y: announce the signed value
  const pct=(v-s.min)/(s.max-s.min)*100, mid=(0-s.min)/(s.max-s.min)*100;
  const f=$('#f_'+s.k);
  if(v>=0){f.style.left=mid+'%';f.style.width=(pct-mid)+'%';f.style.background='var(--pos)';}
  else{f.style.left=pct+'%';f.style.width=(mid-pct)+'%';f.style.background='var(--neg)';}
  $('#i_'+s.k).parentNode.querySelector('.midmark').style.left=mid+'%';
}
//// ---------- EDITOR PREVIEW (canvas, full film engine) ----------
const pvCanvas=$('#pvCanvas');
function paint(){paintPreview();$('#btnExport').hidden=!userImg;}
let pvScheduled=false;
function paintPreview(){
  if(!cur)return;
  if(pvScheduled)return;pvScheduled=true;
  requestAnimationFrame(()=>{pvScheduled=false;
    // render the (optionally cropped) region at its own aspect so it shows whole (contain)
    const src=userImg||baseImg;
    const IW=src.naturalWidth||src.width||3, IH=src.naturalHeight||src.height||2;
    const reg=(cropN&&!cropMode)
      ? {sx:cropN.x*IW,sy:cropN.y*IH,sw:cropN.w*IW,sh:cropN.h*IH}
      : {sx:0,sy:0,sw:IW,sh:IH};
    let w=reg.sw, h=reg.sh, m=Math.max(w,h), cap=1100;
    if(m>cap){const s=cap/m;w*=s;h*=s;}
    renderRecipe(src, cur, vals, pvCanvas, Math.round(w), Math.round(h), {crop:reg});});
}
// slider handlers call paintLook(); keep the name, route to the canvas render.
const paintLook=paintPreview;

// Load a photo from the native camera or the library, then open/refresh the editor.
function loadPhotoFile(f){
  if(!f)return;const rd=new FileReader();
  rd.onload=()=>{const im=new Image();im.onload=()=>{
    userImg=im;cropN=null;                    // new photo → drop any previous crop
    if($('#editor').classList.contains('open')){if(cropMode)cancelCrop();buildEditStrip();paint();}
    else openEditor(lastPreset||FILTERED[0]||RECIPES[0]);
  };im.src=rd.result;};
  rd.readAsDataURL(f);
}
// reset value so re-picking the same file still fires "change"
$('#upload').addEventListener('change',e=>{loadPhotoFile(e.target.files[0]);e.target.value='';});
$('#camInput').addEventListener('change',e=>{loadPhotoFile(e.target.files[0]);e.target.value='';});

//// ---------- CROP (ratio chips + adjustable box) ----------
const CROP_RATIOS=[
  {k:'free',label:'Libre',  r:null},
  {k:'orig',label:'Original',r:'orig'},
  {k:'1:1', label:'1:1',    r:1},
  {k:'4:5', label:'4:5',    r:4/5},
  {k:'5:4', label:'5:4',    r:5/4},
  {k:'3:2', label:'3:2',    r:3/2},
  {k:'2:3', label:'2:3',    r:2/3},
  {k:'16:9',label:'16:9',   r:16/9},
  {k:'9:16',label:'9:16',   r:9/16},
];
function cropSrcWH(){const s=userImg||baseImg;return [s.naturalWidth||s.width||3, s.naturalHeight||s.height||2];}
// normalised aspect (w/h in 0..1 image space) for an output ratio R = outW/outH
function arnFor(r){if(r==null)return null;const [IW,IH]=cropSrcWH();const R=(r==='orig')?(IW/IH):r;return R*IH/IW;}
// displayed image rect inside #preview (object-fit: contain)
function imgDispRect(){
  const pv=$('#preview').getBoundingClientRect();const [IW,IH]=cropSrcWH();
  const s=Math.min(pv.width/IW,pv.height/IH),dW=IW*s,dH=IH*s;
  return {left:(pv.width-dW)/2,top:(pv.height-dH)/2,w:dW,h:dH};
}
function layoutCropBox(){
  if(!cropDraft)return;const R=imgDispRect(),c=cropDraft,b=$('#cropBox');
  b.style.left=(R.left+c.x*R.w)+'px';b.style.top=(R.top+c.y*R.h)+'px';
  b.style.width=(c.w*R.w)+'px';b.style.height=(c.h*R.h)+'px';
}
function buildCropRatios(){
  const wrap=$('#cropRatios');wrap.innerHTML='';
  CROP_RATIOS.forEach(c=>{const b=el('button','crop-rchip');b.textContent=c.label;b.dataset.k=c.k;
    b.setAttribute('role','radio');b.onclick=()=>setCropRatio(c.k);wrap.appendChild(b);});
  markCropRatios();
}
function markCropRatios(){document.querySelectorAll('#cropRatios .crop-rchip').forEach(b=>{
  const on=b.dataset.k===cropARkey;b.classList.toggle('on',on);b.setAttribute('aria-checked',on?'true':'false');});}
function setCropRatio(key){
  cropARkey=key;cropARn=arnFor((CROP_RATIOS.find(c=>c.k===key)||{}).r);markCropRatios();
  if(cropARn){                                   // snap to the largest box of this ratio, kept around the current centre
    const cx=cropDraft.x+cropDraft.w/2, cy=cropDraft.y+cropDraft.h/2;
    let w=1,h=w/cropARn; if(h>1){h=1;w=h*cropARn;}
    cropDraft={x:clamp(cx-w/2,0,1-w),y:clamp(cy-h/2,0,1-h),w,h};
  }
  layoutCropBox();
}
function resizeCropCorner(corner,s,dnx,dny){
  const MIN=0.07;
  const cxs=(corner==='tr'||corner==='br')?s.x+s.w:s.x;   // dragged corner start pos
  const cys=(corner==='bl'||corner==='br')?s.y+s.h:s.y;
  const ax =(corner==='tr'||corner==='br')?s.x:s.x+s.w;   // fixed (anchor) corner
  const ay =(corner==='bl'||corner==='br')?s.y:s.y+s.h;
  const dirX=(corner==='tr'||corner==='br')?1:-1, dirY=(corner==='bl'||corner==='br')?1:-1;
  const pnx=clamp(cxs+dnx,0,1), pny=clamp(cys+dny,0,1);
  const maxW=dirX>0?1-ax:ax, maxH=dirY>0?1-ay:ay;
  if(!cropARn){
    let nw=clamp(Math.abs(pnx-ax),MIN,maxW), nh=clamp(Math.abs(pny-ay),MIN,maxH);
    cropDraft={x:dirX>0?ax:ax-nw, y:dirY>0?ay:ay-nh, w:nw, h:nh};
  }else{
    let w=Math.max(Math.abs(pnx-ax),Math.abs(pny-ay)*cropARn);
    w=Math.min(w,maxW,maxH*cropARn);
    let h=w/cropARn;
    if(h<MIN){h=MIN;w=h*cropARn;}
    if(w<MIN){w=MIN;h=w/cropARn;}
    if(w>maxW){w=maxW;h=w/cropARn;} if(h>maxH){h=maxH;w=h*cropARn;}
    cropDraft={x:dirX>0?ax:ax-w, y:dirY>0?ay:ay-h, w, h};
  }
}
(function cropDrag(){
  const ov=$('#crop');let active=null;
  ov.addEventListener('pointerdown',e=>{
    if(e.target.closest('.crop-bar'))return;                 // let the chips/buttons work
    const h=e.target.closest('.crop-h');
    const box=$('#cropBox').getBoundingClientRect();
    const inBox=e.clientX>=box.left&&e.clientX<=box.right&&e.clientY>=box.top&&e.clientY<=box.bottom;
    if(!h&&!inBox)return;
    active={corner:h&&h.dataset.c,px:e.clientX,py:e.clientY,start:{...cropDraft},R:imgDispRect()};
    ov.setPointerCapture(e.pointerId);e.preventDefault();
  });
  ov.addEventListener('pointermove',e=>{
    if(!active)return;
    const dnx=(e.clientX-active.px)/active.R.w, dny=(e.clientY-active.py)/active.R.h, s=active.start;
    if(active.corner)resizeCropCorner(active.corner,s,dnx,dny);
    else cropDraft={x:clamp(s.x+dnx,0,1-s.w),y:clamp(s.y+dny,0,1-s.h),w:s.w,h:s.h};
    layoutCropBox();
  });
  const end=e=>{if(active){try{ov.releasePointerCapture(e.pointerId);}catch(_){}active=null;}};
  ov.addEventListener('pointerup',end);ov.addEventListener('pointercancel',end);
})();
function enterCrop(){
  if(!cur)return;
  cropMode=true;cropDraft=cropN?{...cropN}:{x:0,y:0,w:1,h:1};
  cropARkey='free';cropARn=null;
  $('#preview').classList.add('cropping');$('#crop').hidden=false;
  buildCropRatios();paintPreview();              // show the whole image while cropping
  requestAnimationFrame(layoutCropBox);
}
function exitCrop(){cropMode=false;$('#crop').hidden=true;$('#preview').classList.remove('cropping');}
function cancelCrop(){exitCrop();paintPreview();}
function applyCrop(){
  const c=cropDraft;
  cropN=(c.w>=0.999&&c.h>=0.999&&c.x<=0.001&&c.y<=0.001)?null:{...c};   // full = no crop
  exitCrop();paint();
}
$('#btnCrop').onclick=enterCrop;
$('#cropApply').onclick=applyCrop;
$('#cropCancel').onclick=cancelCrop;
window.addEventListener('resize',()=>{if(cropMode)layoutCropBox();});

//// ---------- CAMERA / IMPORT (native system camera) ----------
// The OS camera handles capture (best quality, native aspect, no custom UI);
// the look is then applied & tweaked in the editor.
$('#fabCam').onclick=()=>$('#camInput').click();
$('#btnCam').onclick=()=>$('#camInput').click();
$('#fabImport').onclick=()=>$('#upload').click();

//// foot buttons
$('#btnReset').onclick=()=>{if(cur){vals=neutralAdj();cropN=null;if(cropMode)exitCrop();ED_PANELS.forEach(p=>fillPanel(p.id));paint();}toast('Réglages réinitialisés');};

//// EXPORT (bake the current look into the uploaded photo)
function slugify(s){return (s||'recette').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'')
  .replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,40)||'recette';}
function uniqueName(){
  const d=new Date();const p=n=>String(n).padStart(2,'0');
  const stamp=`${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}-${p(d.getHours())}${p(d.getMinutes())}${p(d.getSeconds())}`;
  const rnd=Math.floor(1000+ (Date.now()%9000));
  return `fotn_${slugify(cur&&cur.name)}_${stamp}-${rnd}.jpg`;
}
async function exportImage(){
  if(!userImg)return;
  const btn=$('#btnExport');btn.classList.add('busy');
  try{
    const IW=userImg.naturalWidth||1200, IH=userImg.naturalHeight||800;
    const reg=cropN?{sx:cropN.x*IW,sy:cropN.y*IH,sw:cropN.w*IW,sh:cropN.h*IH}:{sx:0,sy:0,sw:IW,sh:IH};
    let w=reg.sw,h=reg.sh; const maxE=3200,m=Math.max(w,h);if(m>maxE){const s=maxE/m;w*=s;h*=s;}
    w=Math.round(w);h=Math.round(h);
    const cv=document.createElement('canvas');
    renderRecipe(userImg, cur, vals, cv, w, h, {crop:reg});   // film engine + crop, near-native resolution
    const name=uniqueName();
    await new Promise(res=>cv.toBlob(b=>{
      if(!b){toast('Export impossible');return res();}
      const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=name;
      document.body.appendChild(a);a.click();a.remove();
      setTimeout(()=>URL.revokeObjectURL(a.href),4000);
      toast('Exporté · '+name);res();
    },'image/jpeg',0.94));
  }catch(e){toast('Export impossible');}
  finally{btn.classList.remove('busy');}
}
$('#btnExport').onclick=exportImage;

//// toast
let tT;function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(tT);tT=setTimeout(()=>t.classList.remove('show'),1800);}

// close on Esc (crop overlay first, then the editor)
document.addEventListener('keydown',e=>{if(e.key!=='Escape')return;if(cropMode)cancelCrop();else if(cur)closeEditor();});
</script>
