<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>Fudge</title>
<meta name="description" content="Fudge — recettes de simulation de film Fujifilm en presets + curseurs, pour retoucher vos photos.">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Fudge">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600;700&display=swap">
<style>
:root{
  /* Kodak — black & yellow */
  --bg:#000000; --bg2:#0c0c0c; --panel:#151515; --panel2:#1e1e1e;
  --line:#2a2a2a; --line2:#3a3a3a;
  --txt:#f4f4f4; --txt2:#aeaeae; --txt3:#8c8c8c;
  --accent:#ffcd00; --accent2:#ffd633;
  --pos:#ffcd00; --neg:#8a8a8a;
  --ink:#0a0a0a;            /* text/icon colour on yellow */
  /* radius scale */
  --r-lg:16px;             /* cards, sheets */
  --r-md:11px;             /* inputs, buttons, panels, controls */
  --r-sm:7px;              /* badges, inner segments, small marks */
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-t:env(safe-area-inset-top,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%}
body{
  background:var(--bg); color:var(--txt);
  font-family:"Google Sans","Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:15px; line-height:1.45; -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
button{font-family:inherit;color:inherit;cursor:pointer;border:none;background:none}
input{font-family:inherit}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:var(--line2);border-radius:8px}
::-webkit-scrollbar-track{background:transparent}

/* ---------- HEADER ---------- */
.app{max-width:1320px;margin:0 auto;padding:0 16px}
header.top{
  position:sticky;top:0;z-index:40;
  padding-top:calc(var(--safe-t) + 14px);
  background:linear-gradient(180deg,var(--bg) 62%,rgba(0,0,0,0));
}
.brand{display:flex;align-items:center;gap:11px;margin-bottom:13px}
/* Branding mark — the Fudge "F" glyph (logo.svg) on the dark header. */
.logo{height:32px;width:auto;flex:none;display:block}
.brand h1{font-size:21px;font-weight:700;letter-spacing:-.01em;margin:0;line-height:1}
.count{margin-left:auto;font-size:11px;color:var(--txt3);text-align:right;flex:none}
.count b{color:var(--accent);font-weight:700}

.toolbar{display:flex;align-items:center;gap:10px;padding-bottom:12px}
.filters{display:flex;gap:8px;overflow-x:auto;flex:1;min-width:0;scrollbar-width:none;-ms-overflow-style:none}
.filters::-webkit-scrollbar{display:none}
.chip{
  flex:none;padding:7px 13px;border-radius:999px;font-size:13px;white-space:nowrap;
  background:var(--panel);border:1px solid var(--line);color:var(--txt2);transition:.15s;
}
.chip:hover{border-color:var(--line2)}
.chip.on{background:var(--txt);color:var(--ink);border-color:var(--txt);font-weight:600}

/* view-mode switch */
.viewseg{display:flex;flex:none;gap:2px;background:var(--panel);border:1px solid var(--line);border-radius:var(--r-md);padding:3px}
.viewseg button{width:32px;height:30px;border-radius:var(--r-sm);display:grid;place-items:center;color:var(--txt3);transition:.12s}
.viewseg button:hover{color:var(--txt2)}
.viewseg button.on{background:var(--panel2);color:var(--accent)}

/* ---------- GALLERY ---------- */
.gallery{padding:4px 0 40px}
.gallery.view-compact{display:grid;grid-template-columns:repeat(auto-fill,minmax(112px,1fr));gap:10px}
.gallery.view-large{display:grid;grid-template-columns:repeat(2,1fr);gap:13px}
.gallery.view-list{display:flex;flex-direction:column;gap:10px}
@media(min-width:560px){
  .gallery.view-compact{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}
  .gallery.view-large{gap:16px}
}
@media(min-width:880px){
  .gallery.view-compact{grid-template-columns:repeat(auto-fill,minmax(170px,1fr))}
}
/* list mode: horizontal row cards */
.view-list .card{flex-direction:row;align-items:stretch;border-radius:var(--r-md)}
.view-list .thumb{width:128px;flex:none;aspect-ratio:1/1}
.view-list .body{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;padding:12px 14px}
.view-list .card .name{-webkit-line-clamp:2;min-height:0;font-size:15px;margin-bottom:4px}
.view-list .card .sub{font-size:12px}
.view-list .thumb .badge:not(.mono){display:none}     /* clips on the narrow thumb; shown in body instead */
.lbase{display:none}
.view-list .lbase{display:block;font-size:11px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;color:var(--accent);margin-bottom:5px}
@media(min-width:560px){.view-list .thumb{width:160px}}

.loadmore-wrap{display:flex;justify-content:center;padding:8px 0 calc(var(--safe-b) + 96px)}
.loadmore{padding:11px 22px;border-radius:999px;background:var(--panel);border:1px solid var(--line2);
  color:var(--txt);font-size:13px;font-weight:600;transition:.15s}
.loadmore:hover{border-color:var(--accent);color:var(--accent)}
.loadmore[hidden]{display:none}
.card{
  background:var(--panel);border:1px solid var(--line);border-radius:var(--r-lg);
  overflow:hidden;cursor:pointer;transition:transform .18s cubic-bezier(.2,.7,.3,1),border-color .18s;
  display:flex;flex-direction:column;
}
.card:hover{transform:translateY(-3px);border-color:var(--line2)}
.card:active{transform:translateY(0) scale(.98)}
.thumb{aspect-ratio:5/4;position:relative;overflow:hidden;background:var(--panel)}
.thumb .ph{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
.badge{
  position:absolute;top:8px;left:8px;font-size:10px;font-weight:700;letter-spacing:.3px;
  padding:3px 7px;border-radius:var(--r-sm);background:rgba(0,0,0,.5);backdrop-filter:blur(6px);
  color:#fff;text-transform:uppercase;
}
.badge.mono{top:auto;bottom:8px;right:8px;left:auto;color:var(--accent)}
.fav{position:absolute;top:6px;right:6px;width:28px;height:28px;border-radius:50%;
  display:grid;place-items:center;background:rgba(0,0,0,.4);backdrop-filter:blur(6px);color:#fff;z-index:3;transition:background .15s,transform .15s}
.fav:hover{background:rgba(0,0,0,.65);transform:scale(1.08)}
.fav::before{content:"";position:absolute;inset:-8px}  /* ≥44px touch target */
.fav.on{color:var(--accent)}
.card .body{padding:10px 11px 12px}
.card .name{font-size:13px;font-weight:600;line-height:1.25;margin:0 0 3px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:34px}
.card .sub{font-size:11px;color:var(--txt3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.empty{text-align:center;color:var(--txt3);padding:60px 20px}

/* ---------- DETAIL / EDITOR ---------- */
.scrim{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(3px);opacity:0;
  pointer-events:none;transition:.25s;z-index:50}
.scrim.show{opacity:1;pointer-events:auto}
.editor{
  position:fixed;z-index:60;background:var(--bg2);
  display:flex;flex-direction:column;
  transition:transform .34s cubic-bezier(.2,.8,.2,1);
}
/* mobile: bottom sheet full */
.editor{left:0;right:0;bottom:0;top:0;transform:translateY(100%)}
.editor.open{transform:translateY(0)}
@media(min-width:880px){
  .editor{left:auto;top:0;bottom:0;width:520px;transform:translateX(100%);
    border-left:1px solid var(--line);box-shadow:-30px 0 60px -30px rgba(0,0,0,.6)}
  .editor.open{transform:translateX(0)}
}
.ed-head{display:flex;align-items:center;gap:12px;padding:calc(var(--safe-t) + 12px) 16px 12px;
  border-bottom:1px solid var(--line);flex:none}
.ed-head .x{position:relative;width:34px;height:34px;border-radius:var(--r-md);background:var(--panel2);display:grid;place-items:center;flex:none;transition:background .15s}
.ed-head .x:hover{background:var(--line2)}
.ed-head .x::before,.ed-head .hfav::before{content:"";position:absolute;inset:-5px}  /* ≥44px touch target */
.ed-head .t{min-width:0;flex:1}
.ed-head .t h2{margin:0;font-size:18px;font-weight:700;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ed-head .t span{font-size:11px;color:var(--txt3)}
.ed-head .hfav{position:relative;width:34px;height:34px;border-radius:var(--r-md);background:var(--panel2);display:grid;place-items:center;flex:none;transition:background .15s}
.ed-head .hfav:hover{background:var(--line2)}
.ed-head .hfav.on{color:var(--accent)}

/* pinned preview — full photo (contain), ~half the screen */
.preview{position:relative;width:100%;height:50vh;background:#000;overflow:hidden;flex:none}
.preview canvas{width:100%;height:100%;object-fit:contain;display:block}
@media(min-width:880px){.preview{height:300px}}
.pv-tools{position:absolute;left:10px;bottom:10px;display:flex;gap:8px;z-index:4}
.pv-btn{font-size:12px;padding:7px 11px;border-radius:var(--r-md);background:rgba(0,0,0,.5);backdrop-filter:blur(8px);
  color:#fff;display:flex;align-items:center;gap:6px;border:1px solid rgba(255,255,255,.16);transition:background .15s,border-color .15s}
.pv-btn:hover{background:rgba(0,0,0,.7);border-color:rgba(255,255,255,.3)}

/* section tabs */
.tabs{display:flex;gap:4px;overflow-x:auto;flex:none;padding:9px 12px;border-bottom:1px solid var(--line);
  scrollbar-width:none;-ms-overflow-style:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:none;padding:8px 14px;border-radius:999px;font-size:13px;font-weight:600;color:var(--txt3);white-space:nowrap;transition:.12s}
.tab:hover{color:var(--txt2)}
.tab.on{background:var(--panel2);color:var(--accent)}

/* horizontally-swipeable panels — one section at a time, preview stays pinned */
.panels{flex:1;display:flex;overflow-x:auto;overflow-y:hidden;scroll-snap-type:x mandatory;
  scrollbar-width:none;-ms-overflow-style:none;-webkit-overflow-scrolling:touch}
.panels::-webkit-scrollbar{display:none}
.panel{flex:0 0 100%;width:100%;scroll-snap-align:start;overflow-y:auto;overscroll-behavior:contain;
  padding:16px 16px calc(var(--safe-b) + 16px)}

.sec-h{font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:var(--txt3);
  margin:14px 0 12px;font-weight:700;display:flex;align-items:center;gap:8px}
.sec-h .ln{flex:1;height:1px;background:var(--line)}

.basepick{display:flex;flex-wrap:wrap;gap:7px}
.basepick button{padding:8px 12px;border-radius:var(--r-md);background:var(--panel);border:1px solid var(--line);
  font-size:12px;color:var(--txt2);transition:border-color .15s,color .15s}
.basepick button:hover{border-color:var(--line2);color:var(--txt)}
.basepick button.on{background:var(--accent);color:var(--ink);border-color:var(--accent);font-weight:600}
.basepick button.on:hover{color:var(--ink)}

/* slider */
.sld{margin-bottom:18px}
.sld:last-child{margin-bottom:4px}
.sld-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px}
.sld-top label{font-size:13px;font-weight:500;color:var(--txt)}
.sld-val{font-variant-numeric:tabular-nums;font-weight:700;font-size:14px;min-width:42px;text-align:right}
.sld-val.pos{color:var(--pos)} .sld-val.neg{color:var(--neg)} .sld-val.zero{color:var(--txt3)}
.range{position:relative;height:26px;display:flex;align-items:center}
.range .track{position:absolute;left:0;right:0;height:4px;border-radius:3px;background:var(--line2)}
.range .midmark{position:absolute;top:50%;transform:translateY(-50%);width:1px;height:11px;background:var(--txt3);opacity:.6}
.range .fill{position:absolute;height:4px;border-radius:3px;background:var(--accent);opacity:.9}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;background:transparent;position:relative;z-index:2;margin:0;height:26px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;
  background:#fff;border:2px solid var(--accent);box-shadow:0 2px 8px rgba(0,0,0,.4);cursor:grab}
input[type=range]::-webkit-slider-thumb:active{cursor:grabbing;transform:scale(1.12)}
input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:#fff;border:2px solid var(--accent)}

/* segmented */
.seg-row{margin-bottom:16px}
.seg-row > label{font-size:13px;font-weight:500;display:block;margin-bottom:8px}
.seg{display:flex;gap:5px;background:var(--panel);padding:4px;border-radius:var(--r-md);border:1px solid var(--line)}
.seg button{flex:1;padding:8px 4px;border-radius:var(--r-sm);font-size:12px;color:var(--txt2);transition:.12s;font-weight:500}
.seg button:hover{color:var(--txt)}
.seg button.on{background:var(--panel2);color:var(--txt);box-shadow:0 1px 3px rgba(0,0,0,.3);font-weight:600}
.seg button.on.acc{background:var(--accent);color:var(--ink)}

.wbline{font-size:13px;color:var(--txt2);background:var(--panel);border:1px solid var(--line);
  border-radius:var(--r-md);padding:11px 13px;display:flex;justify-content:space-between;align-items:center}
.wbline b{color:var(--txt);font-weight:600}

.rawbox{background:var(--panel);border:1px solid var(--line);border-radius:var(--r-md);padding:13px 14px;
  font-size:12px;color:var(--txt2);white-space:pre-wrap;line-height:1.6;font-family:ui-monospace,Menlo,monospace}

.ed-foot{flex:none;display:flex;gap:10px;padding:12px 16px calc(var(--safe-b) + 14px);
  border-top:1px solid var(--line);background:var(--bg2)}
.ed-foot button{flex:1;padding:13px;border-radius:var(--r-md);font-weight:600;font-size:14px;transition:filter .15s,background .15s}
.btn-reset{background:var(--panel2);border:1px solid var(--line2);color:var(--txt)}
.btn-reset:hover{background:var(--line2)}
.btn-export{background:var(--accent2);color:var(--ink);display:flex;align-items:center;justify-content:center}
.btn-export:hover{filter:brightness(1.08)}
.btn-export.busy{opacity:.6;pointer-events:none}
.btn-export[hidden]{display:none}

.toast{position:fixed;bottom:calc(var(--safe-b) + 22px);left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--accent);color:var(--ink);padding:11px 18px;border-radius:var(--r-md);font-size:13px;font-weight:600;
  z-index:100;opacity:0;transition:.25s;box-shadow:0 10px 30px rgba(0,0,0,.5)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.fabs{position:fixed;right:16px;bottom:calc(var(--safe-b) + 16px);z-index:30;display:flex;flex-direction:column;gap:10px}
.fab{width:52px;height:52px;border-radius:50%;background:var(--accent);color:var(--ink);
  display:grid;place-items:center;box-shadow:0 8px 24px -6px var(--accent);transition:transform .15s,filter .15s}
.fab:hover{transform:translateY(-2px);filter:brightness(1.06)}
.fab:active{transform:translateY(0)}
.fab.sec{background:var(--panel2);color:var(--txt);border:1px solid var(--line2);box-shadow:0 6px 18px rgba(0,0,0,.4);width:46px;height:46px}
.fab.sec:hover{background:var(--line2);filter:none}

/* keyboard focus — one consistent ring everywhere */
:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
button:focus-visible,input:focus-visible,a:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:var(--r-sm)}

@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;
    transition-duration:.001ms!important;scroll-behavior:auto!important}
}
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="brand">
      <img class="logo" src="logo.svg" alt="Fudge" width="28" height="32">
      <div>
        <h1>Fudge</h1>
      </div>
    </div>
    <div class="toolbar">
      <div class="filters" id="filters"></div>
      <div class="viewseg" id="viewToggle" role="radiogroup" aria-label="Affichage des recettes">
        <button data-v="compact" aria-label="Grille compacte" title="Grille compacte">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M4 8h4V4H4v4zm6 12h4v-4h-4v4zm-6 0h4v-4H4v4zm0-6h4v-4H4v4zm6 0h4v-4h-4v4zm6-10v4h4V4h-4zm-6 4h4V4h-4v4zm6 6h4v-4h-4v4zm0 6h4v-4h-4v4z"></path></svg>
        </button>
        <button data-v="large" aria-label="Grandes cartes" title="Grandes cartes">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M3 3v8h8V3H3zm6 6H5V5h4v4zm-6 4v8h8v-8H3zm6 6H5v-4h4v4zm4-16v8h8V3h-8zm6 6h-4V5h4v4zm-6 4v8h8v-8h-8zm6 6h-4v-4h4v4z"></path></svg>
        </button>
        <button data-v="list" aria-label="Liste" title="Liste">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M20 13H4c-.55 0-1 .45-1 1v6c0 .55.45 1 1 1h16c.55 0 1-.45 1-1v-6c0-.55-.45-1-1-1zm0-9H4c-.55 0-1 .45-1 1v6c0 .55.45 1 1 1h16c.55 0 1-.45 1-1V5c0-.55-.45-1-1-1z"></path></svg>
        </button>
      </div>
    </div>
  </header>

  <main>
    <div id="gallery" class="gallery view-large"></div>
    <div class="loadmore-wrap"><button id="loadMore" class="loadmore" hidden></button></div>
  </main>
</div>

<div class="fabs">
  <button class="fab sec" id="fabFav" title="Favoris" aria-label="Afficher les favoris" aria-pressed="false">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"></path></svg>
  </button>
  <button class="fab" id="fabNew" title="Créer la vôtre" aria-label="Créer une recette">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"></path></svg>
  </button>
</div>

<!-- EDITOR -->
<div class="scrim" id="scrim"></div>
<div class="editor" id="editor" role="dialog" aria-modal="true" aria-labelledby="edName">
  <div class="ed-head">
    <button class="x" id="edClose" aria-label="Fermer">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M19 6.41 17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"></path></svg>
    </button>
    <div class="t"><h2 id="edName">—</h2><span id="edSub"></span></div>
    <button class="hfav" id="edFav" aria-label="Favori" aria-pressed="false">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M16.5 3c-1.74 0-3.41.81-4.5 2.09C10.91 3.81 9.24 3 7.5 3 4.42 3 2 5.42 2 8.5c0 3.78 3.4 6.86 8.55 11.54L12 21.35l1.45-1.32C18.6 15.36 22 12.28 22 8.5 22 5.42 19.58 3 16.5 3zm-4.4 15.55l-.1.1-.1-.1C7.14 14.24 4 11.39 4 8.5 4 6.5 5.5 5 7.5 5c1.54 0 3.04.99 3.57 2.36h1.87C13.46 5.99 14.96 5 16.5 5c2 0 3.5 1.5 3.5 3.5 0 2.89-3.14 5.74-7.9 10.05z"></path></svg>
    </button>
  </div>

  <div class="preview" id="preview">
    <canvas id="pvCanvas" role="img" aria-label="Aperçu de la recette appliquée à la photo"></canvas>
    <div class="pv-tools">
      <label class="pv-btn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"></path></svg>
        Ma photo
        <input id="upload" type="file" accept="image/*" hidden>
      </label>
    </div>
  </div>

  <div class="tabs" id="edTabs" role="tablist" aria-label="Sections de réglage"></div>
  <div class="panels" id="edPanels">
    <section class="panel" id="panel-base" role="tabpanel" aria-label="Simulation de base"></section>
    <section class="panel" id="panel-light" role="tabpanel" aria-label="Lumière"></section>

<script>
//// ---------- MATERIAL DESIGN ICONS (Apache 2.0) ----------
const MI={
  heart:'M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z',
  heartO:'M16.5 3c-1.74 0-3.41.81-4.5 2.09C10.91 3.81 9.24 3 7.5 3 4.42 3 2 5.42 2 8.5c0 3.78 3.4 6.86 8.55 11.54L12 21.35l1.45-1.32C18.6 15.36 22 12.28 22 8.5 22 5.42 19.58 3 16.5 3zm-4.4 15.55l-.1.1-.1-.1C7.14 14.24 4 11.39 4 8.5 4 6.5 5.5 5 7.5 5c1.54 0 3.04.99 3.57 2.36h1.87C13.46 5.99 14.96 5 16.5 5c2 0 3.5 1.5 3.5 3.5 0 2.89-3.14 5.74-7.9 10.05z',

  add:'M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z',

  download:'M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z',
};
// inline material svg
function svgIcon(path,size){return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="${path}"></path></svg>`;}
// favorite heart that swaps filled/outline by state
function heartSvg(on,size){return svgIcon(on?MI.heart:MI.heartO,size);}
function setHeart(btn,on){if(!btn)return;const p=btn.querySelector('path');if(p)p.setAttribute('d',on?MI.heart:MI.heartO);btn.setAttribute('aria-pressed',!!on);}

// Turn a container of role=radio buttons into a keyboard radiogroup:
// roving tabindex + arrow/Home/End navigation (selection follows focus).
function wireRadios(group){
  const radios=[...group.querySelectorAll('[role=radio]')];
  if(!radios.length)return;
  let ci=radios.findIndex(b=>b.getAttribute('aria-checked')==='true');
  if(ci<0)ci=0;
  radios.forEach((b,i)=>b.tabIndex=i===ci?0:-1);
  const rg=group.getAttribute('data-rg');
  group.onkeydown=e=>{
    const i=radios.indexOf(document.activeElement);if(i<0)return;
    let n=null;const k=e.key;
    if(k==='ArrowRight'||k==='ArrowDown')n=(i+1)%radios.length;
    else if(k==='ArrowLeft'||k==='ArrowUp')n=(i-1+radios.length)%radios.length;
    else if(k==='Home')n=0;else if(k==='End')n=radios.length-1;else return;
    e.preventDefault();
    const val=radios[n].getAttribute('data-rv');
    radios[n].click();                 // selects -> rebuilds the group(s)
    const sel=document.querySelector(`[data-rg="${rg}"] [data-rv="${val}"]`);
    if(sel)sel.focus();
  };
}

//// ---------- PREVIEW IMAGES ----------
// Generic royalty-free photo (served alongside the app) used on cards + as default preview.
const GENERIC_IMG='generic.jpg?v=2';
const baseImg=new Image();let baseReady=false;
baseImg.onload=()=>{baseReady=true;rerenderCards();};
baseImg.src=GENERIC_IMG;
function clamp(x,a,b){return x<a?a:x>b?b:x;}

//// ====================================================================
//// FILM ENGINE — real per-pixel reinterpretation of each Fuji recipe.
//// Pipeline / pixel: White Balance -> simulation colour matrix -> saturation
//// (+ Colour Chrome) -> split-tone -> contrast -> highlight/shadow tone
//// -> matte lift -> mono+toning -> grain -> vignette.
//// Same engine drives the cards, the editor preview and the export.
//// ====================================================================

// Per-simulation colour science (artistic approximations of each film sim).
// mx = 3x3 channel matrix; sat/con base; lift = matte black raise;
// split = split-tone strength with sh (shadow) / hi (highlight) colour vectors.
const I3=[1,0,0, 0,1,0, 0,0,1];
const SIM={
 'Provia':{mx:I3,sat:1.00,con:1.06,lift:0,split:0},
 'Astia':{mx:[1.03,0,-0.02, 0,1.0,0, -0.01,0,0.99],sat:0.92,con:0.96,lift:0.02,split:0.25,sh:[0,0,0.01],hi:[0.03,0.015,-0.02]},
 'Velvia':{mx:[1.11,-0.07,-0.04, -0.04,1.09,-0.05, -0.03,-0.07,1.10],sat:1.34,con:1.15,lift:0,split:0},
 'Classic Chrome':{mx:[0.92,0.07,0.01, 0.02,0.95,0.03, 0.02,0.05,0.93],sat:0.72,con:1.08,lift:0.045,split:0.45,sh:[-0.015,0.01,0.02],hi:[0.02,0.005,-0.015]},
 'Classic Negative':{mx:[1.07,-0.03,-0.02, -0.03,1.0,-0.01, -0.02,0.05,1.0],sat:0.90,con:1.13,lift:0.035,split:0.62,sh:[-0.03,0.02,0.035],hi:[0.045,0.02,-0.04]},
 'Nostalgic Negative':{mx:[1.06,0,-0.04, 0,1.0,-0.01, -0.02,0,0.95],sat:0.96,con:1.0,lift:0.045,split:0.4,sh:[0,0,0.01],hi:[0.05,0.025,-0.03]},
 'Eterna':{mx:[0.99,0.02,0.01, 0.01,0.99,0.02, 0.02,0.03,0.98],sat:0.66,con:0.86,lift:0.065,split:0.5,sh:[-0.02,0.005,0.025],hi:[0.02,0.01,-0.01]},
 'Pro Neg. Std':{mx:[1.01,0,-0.01, 0,1.0,0, 0,0,1.0],sat:0.85,con:0.92,lift:0.015,split:0.15,sh:[0,0,0.005],hi:[0.015,0.01,-0.01]},
 'Pro Neg. High':{mx:[1.01,0,-0.01, 0,1.0,0, 0,0,1.0],sat:0.88,con:1.08,lift:0.01,split:0.15,sh:[0,0,0.005],hi:[0.015,0.01,-0.01]},
 'Acros':{mono:1,con:1.13,lift:0.01,filt:[0.30,0.59,0.11]},
 'Monochrome':{mono:1,con:1.0,lift:0.01,filt:[0.30,0.59,0.11]},
 'Sepia':{mono:1,con:1.0,lift:0.02,filt:[0.30,0.59,0.11],tone:[0.07,-0.02,-0.20]},
};
const LVL={Off:0,Weak:1,Strong:2,Medium:1.5};

// White balance string -> {kelvin, tint(+magenta / -green)}
function parseWB(s){
  if(!s) return {kelvin:5500,tint:0};
  s=''+s;const low=s.toLowerCase();
  let m=s.match(/(\d{3,5})\s*k\b/i)||s.match(/\bk\s*[:=]?\s*(\d{3,5})/i);
  let kelvin=m?parseInt(m[1]):null, tint=0;
  if(kelvin===null){
    if(/shade/.test(low))kelvin=7500;
    else if(/cloud/.test(low))kelvin=6500;
    else if(/daylight|sunny|\bfine\b/.test(low))kelvin=5400;
    else if(/incandescent|tungsten/.test(low))kelvin=3200;
    else if(/underwater/.test(low)){kelvin=6200;tint=-0.6;}
    else if(/fluor/.test(low)){kelvin=/3/.test(low)?5000:/2/.test(low)?4500:3900;tint=0.5;}
    else if(/flash/.test(low))kelvin=5600;
    else kelvin=5500; // auto / white priority / unknown -> neutral
  }
  return {kelvin:clamp(kelvin,2500,12000),tint};
}

// Pre-compute all per-recipe constants once (not per pixel).
function buildOps(v){
  const wb=parseWB(v.wb);
  const t=clamp((wb.kelvin-5500)/4500,-1,1.3);          // image warmth from set-Kelvin
  const rG=1+0.20*t+(v.wbRed||0)*0.012;
  const gG=1-wb.tint*0.10;
  const bG=1-0.20*t+(v.wbBlue||0)*0.012;
  const sim=SIM[v.base]||SIM.Provia;
  const mx=sim.mx||I3;
  const drC={DR100:0.05,DR200:0,DR400:-0.07,Auto:-0.02}[v.dr]||0;
  const sat=(sim.mono?0:(sim.sat||1))*(1+(v.color||0)*0.14);
  const con=(sim.con||1)*(1+(v.clarity||0)*0.022+drC);
  return {
    rG,gG,bG,mx,sim,
    sat,con,lift:sim.lift||0,
    split:sim.split||0, sh:sim.sh||[0,0,0], hi:sim.hi||[0,0,0],
    he:v.highlights||0, she:v.shadows||0,
    chrome:LVL[v.colorChrome]||0, chromeB:LVL[v.colorChromeBlue]||0,
    mono:!!sim.mono, filt:sim.filt||[0.3,0.59,0.11], tone:sim.tone||null,
    grain:(LVL[v.grain]||0)*(v.grainSize==='Large'?1.35:1),
    vig:0.16+(v.clarity>0?v.clarity*0.012:0),
  };
}

// Cover-draw an image into a w×h context (object-fit: cover).
function drawCover(ctx,img,w,h){
  const iw=img.naturalWidth||img.width||w, ih=img.naturalHeight||img.height||h;
  const s=Math.max(w/iw,h/ih), dw=iw*s, dh=ih*s;
  ctx.drawImage(img,(w-dw)/2,(h-dh)/2,dw,dh);
}

// Render a recipe onto a canvas at w×h from a source image.
function renderRecipe(src,v,canvas,w,h){
  canvas.width=w;canvas.height=h;
  const ctx=canvas.getContext('2d',{willReadFrequently:true});
  if(!src||!(src.naturalWidth||src.width)){ctx.fillStyle='#151515';ctx.fillRect(0,0,w,h);return;}
  drawCover(ctx,src,w,h);
  const id=ctx.getImageData(0,0,w,h),d=id.data;
  const O=buildOps(v);
  const mx=O.mx, cx=w/2, cy=h/2, maxd=Math.sqrt(cx*cx+cy*cy);
  let p=0;
  for(let y=0;y<h;y++){
    for(let x=0;x<w;x++,p+=4){
      let r=d[p]/255, g=d[p+1]/255, b=d[p+2]/255;
      // 1. white balance
      r*=O.rG; g*=O.gG; b*=O.bG;
      // 2. simulation colour matrix
      let nr=r*mx[0]+g*mx[1]+b*mx[2];
      let ng=r*mx[3]+g*mx[4]+b*mx[5];
      let nb=r*mx[6]+g*mx[7]+b*mx[8];
      r=nr;g=ng;b=nb;
      let lum=0.299*r+0.587*g+0.114*b;
      // 3. saturation
      r=lum+(r-lum)*O.sat; g=lum+(g-lum)*O.sat; b=lum+(b-lum)*O.sat;
      // 3b. colour chrome (deepen already-saturated colours)
      if(O.chrome){
        const mxc=r>g?(r>b?r:b):(g>b?g:b), mnc=r<g?(r<b?r:b):(g<b?g:b), chroma=mxc-mnc;
        const boost=1+O.chrome*0.12*chroma;
        r=lum+(r-lum)*boost; g=lum+(g-lum)*boost; b=lum+(b-lum)*boost;
      }
      if(O.chromeB && b>r && b>g){const boost=1+O.chromeB*0.14*(b-((r+g)/2));b=lum+(b-lum)*boost;}
      // 4. split-tone
      if(O.split){
        const sF=lum<0.5?(0.5-lum)*2:0, hF=lum>0.5?(lum-0.5)*2:0, sp=O.split;
        r+=(O.sh[0]*sF+O.hi[0]*hF)*sp; g+=(O.sh[1]*sF+O.hi[1]*hF)*sp; b+=(O.sh[2]*sF+O.hi[2]*hF)*sp;
      }
      // 5. contrast (pivot 0.5)
      r=(r-0.5)*O.con+0.5; g=(g-0.5)*O.con+0.5; b=(b-0.5)*O.con+0.5;
      // 6. highlight / shadow tone
      lum=0.299*r+0.587*g+0.114*b;
      if(O.he&&lum>0.45){const f=(lum-0.45)/0.55*O.he*0.028;r+=f;g+=f;b+=f;}
      if(O.she&&lum<0.55){const f=(0.55-lum)/0.55*O.she*0.028;r-=f;g-=f;b-=f;}
      // 7. matte lift
      if(O.lift){const L=O.lift;r=L+r*(1-L);g=L+g*(1-L);b=L+b*(1-L);}
      // 8. mono + toning
      if(O.mono){
        let yv=O.filt[0]*r+O.filt[1]*g+O.filt[2]*b;
        if(O.tone){r=yv+O.tone[0];g=yv+O.tone[1];b=yv+O.tone[2];}
        else{r=g=b=yv;}
      }
      // 9. grain (luminance noise)
      if(O.grain){const n=(Math.random()-0.5)*O.grain*0.05;r+=n;g+=n;b+=n;}
      // 10. vignette
      if(O.vig){const dx=x-cx,dy=y-cy,dd=Math.sqrt(dx*dx+dy*dy)/maxd;
        if(dd>0.55){const vf=1-(dd-0.55)/0.45*O.vig;r*=vf;g*=vf;b*=vf;}}
      d[p]=r<0?0:r>1?255:r*255;
      d[p+1]=g<0?0:g>1?255:g*255;
      d[p+2]=b<0?0:b>1?255:b*255;
    }
  }
  ctx.putImageData(id,0,0);
}

//// ---------- STATE ----------
let RECIPES=[], FILTERED=[], rendered=0;
let VIEW=['compact','large','list'].includes(localStorage.getItem('fudge_view'))?localStorage.getItem('fudge_view'):'large';
let cur=null;            // recipe being edited
let vals={};             // live control values
let userImg=null;        // uploaded image data url
const favs=new Set(JSON.parse(localStorage.getItem('fuji_favs')||'[]'));
const filterState={mono:'all', fav:false};

const $=s=>document.querySelector(s);
const el=(t,c)=>{const e=document.createElement(t);if(c)e.className=c;return e;};

//// ---------- LOAD ----------
fetch('recipes.json').then(r=>r.json()).then(data=>{
  RECIPES=data.map((r,i)=>{r._i=i;return r;});
  buildFilters();
  applyFilters();
}).catch(e=>{
  $('#gallery').innerHTML='<div class="empty">Impossible de charger recipes.json<br><small>'+e+'</small></div>';
});

//// ---------- FILTER BAR ----------
function buildFilters(){
  const wrap=$('#filters');wrap.innerHTML='';
  const mk=(label,on,fn)=>{const b=el('button','chip');b.textContent=label;if(on)b.classList.add('on');b.setAttribute('aria-pressed',on?'true':'false');b.onclick=fn;return b;};
  wrap.appendChild(mk('Favoris', filterState.fav,()=>{filterState.fav=!filterState.fav;buildFilters();applyFilters();}));
  wrap.appendChild(mk('Couleur', filterState.mono==='color',()=>{filterState.mono=filterState.mono==='color'?'all':'color';buildFilters();applyFilters();}));
  wrap.appendChild(mk('Noir & blanc', filterState.mono==='bw',()=>{filterState.mono=filterState.mono==='bw'?'all':'bw';buildFilters();applyFilters();}));
}

function applyFilters(){
  FILTERED=RECIPES.filter(r=>{
    if(filterState.fav && !favs.has(r._i)) return false;
    if(filterState.mono==='color' && r.mono) return false;
    if(filterState.mono==='bw' && !r.mono) return false;
    return true;
  });
  rendered=0;$('#gallery').innerHTML='';
  if(!FILTERED.length){$('#gallery').innerHTML='<div class="empty">Aucune recette trouvée 🎞️</div>';$('#loadMore').hidden=true;return;}
  renderMore();
}

//// ---------- GALLERY RENDER (load-more, 3 view modes) ----------
function cardDims(){return VIEW==='large'?[480,384]:VIEW==='list'?[320,240]:[260,208];}
function pageSize(){return VIEW==='compact'?36:12;}
function card(r){
  const c=el('div','card');
  c.tabIndex=0;c.setAttribute('role','button');
  c.setAttribute('aria-label',`Ouvrir la recette ${r.name||'sans titre'} · ${r.base||''}`);
  c.onclick=()=>openEditor(r);
  c.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();openEditor(r);}};
  const fav=favs.has(r._i);
  const [w,h]=cardDims();
  c.innerHTML=`
    <div class="thumb">
      <canvas class="ph" data-ri="${r._i}" width="${w}" height="${h}" aria-hidden="true"></canvas>
      <span class="badge">${esc(r.base||'—')}</span>
      ${r.mono?'<span class="badge mono">N&B</span>':''}
      <button class="fav ${fav?'on':''}" data-i="${r._i}" aria-label="Ajouter aux favoris" aria-pressed="${fav}">${heartSvg(fav,16)}</button>
    </div>
    <div class="body">
      <div class="lbase">${esc(r.base||'')}${r.mono?' · N&B':''}</div>
      <p class="name">${esc(r.name||'Sans titre')}</p>
      <div class="sub">${esc(r.creator||'—')} · ${esc(r.camera||r.sensor||'')}</div>
    </div>`;
  c.querySelector('.fav').onclick=(e)=>{e.stopPropagation();toggleFav(r._i,e.currentTarget);};
  const cv=c.querySelector('canvas');
  if(baseReady)renderRecipe(baseImg,recipeToVals(r),cv,w,h);
  return c;
}
// (Re)paint every card thumbnail (after the image loads, or on view change).
function rerenderCards(){
  if(!baseReady)return;const [w,h]=cardDims();
  document.querySelectorAll('.thumb canvas[data-ri]').forEach(cv=>{
    const r=RECIPES[+cv.dataset.ri]; if(r)renderRecipe(baseImg,recipeToVals(r),cv,w,h);
  });
}
function renderMore(){
  const g=$('#gallery');const frag=document.createDocumentFragment();
  const end=Math.min(rendered+pageSize(),FILTERED.length);
  for(let i=rendered;i<end;i++)frag.appendChild(card(FILTERED[i]));
  g.appendChild(frag);rendered=end;updateLoadMore();
}
function updateLoadMore(){
  const btn=$('#loadMore');const rem=FILTERED.length-rendered;
  if(rem>0){btn.hidden=false;btn.textContent=`Charger plus · ${rem} restantes`;}
  else btn.hidden=true;
}
$('#loadMore').onclick=renderMore;

//// ---------- VIEW MODE ----------
function setView(v){
  if(!['compact','large','list'].includes(v))v='large';
  VIEW=v;localStorage.setItem('fudge_view',v);
  $('#gallery').className='gallery view-'+v;
  document.querySelectorAll('#viewToggle button').forEach(b=>{
    const on=b.dataset.v===v;b.classList.toggle('on',on);b.setAttribute('aria-checked',on?'true':'false');b.tabIndex=on?0:-1;
  });
  rendered=0;$('#gallery').innerHTML='';renderMore();   // re-render so canvases match the new size
}
(function initViewToggle(){
  const vt=$('#viewToggle');vt.setAttribute('data-rg','view');
  vt.querySelectorAll('button').forEach(b=>{b.setAttribute('role','radio');b.setAttribute('data-rv',b.dataset.v);b.onclick=()=>setView(b.dataset.v);});
  setView(VIEW);
  wireRadios(vt);
})();

function esc(s){return (s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}

//// ---------- FAVORITES ----------
function toggleFav(i,btn){
  if(favs.has(i))favs.delete(i);else favs.add(i);
  localStorage.setItem('fuji_favs',JSON.stringify([...favs]));
  if(btn){const on=favs.has(i);btn.classList.toggle('on',on);setHeart(btn,on);}
}
$('#fabFav').onclick=()=>{filterState.fav=!filterState.fav;buildFilters();applyFilters();
  $('#fabFav').setAttribute('aria-pressed',filterState.fav?'true':'false');
  toast(filterState.fav?'Favoris seulement':'Toutes les recettes');};

//// ---------- EDITOR ----------
const NUM_SLIDERS=[
  {k:'highlights',label:'Hautes lumières',min:-2,max:4,step:.5},
  {k:'shadows',label:'Ombres',min:-2,max:4,step:.5},
  {k:'color',label:'Couleur (saturation)',min:-4,max:4,step:1},
  {k:'sharpness',label:'Netteté',min:-4,max:4,step:1},
  {k:'clarity',label:'Clarté',min:-5,max:5,step:1},
  {k:'noiseReduction',label:'Réduction du bruit',min:-4,max:4,step:1},
  {k:'wbRed',label:'WB · Rouge',min:-9,max:9,step:1},
  {k:'wbBlue',label:'WB · Bleu',min:-9,max:9,step:1},
];
const BASES=['Provia','Astia','Velvia','Classic Chrome','Classic Negative','Nostalgic Negative','Eterna','Pro Neg. Std','Pro Neg. High','Acros','Monochrome','Sepia'];
const LV=['Off','Weak','Strong'];const LVfr={Off:'Désactivé',Weak:'Faible',Strong:'Fort',Medium:'Moyen'};
function normLv(v){if(!v)return 'Off';v=(''+v);if(/strong/i.test(v))return 'Strong';if(/weak/i.test(v))return 'Weak';if(/medium|std/i.test(v))return 'Medium';if(/off|none/i.test(v))return 'Off';return 'Weak';}

function recipeToVals(r){
  return {
    base:r.base&&BASES.includes(r.base)?r.base:(r.mono?'Acros':'Provia'),
    mono:!!r.mono,
    highlights:def(r.highlights,0),shadows:def(r.shadows,0),color:def(r.color,0),
    sharpness:def(r.sharpness,0),clarity:def(r.clarity,0),noiseReduction:def(r.noiseReduction,0),
    wbRed:def(r.wbRed,0),wbBlue:def(r.wbBlue,0),wb:r.whiteBalance||'',
    grain:normLv(r.grain),grainSize:(/large/i.test(r.grainSize||'')?'Large':'Small'),
    colorChrome:normLv(r.colorChrome),colorChromeBlue:normLv(r.colorChromeBlue),
    dr:r.dynamicRange&&/100|200|400|auto/i.test(r.dynamicRange)?r.dynamicRange.replace(/dr/i,'DR').replace('DRAuto','Auto'):'Auto',
  };
}
function openEditor(r,blank){
  cur=r;
  vals=recipeToVals(r);
  $('#edName').textContent=blank?'Nouvelle recette':(r.name||'Sans titre');
  $('#edSub').textContent=blank?'Partez des réglages ci-dessous':`${r.creator||'—'} · ${r.sensor||r.camera||''}`;
  syncFav();
  buildEditorPanels();
  paint();
  document.body.style.overflow='hidden';
  // a11y: remember focus origin, neutralise background, move focus into the dialog
  lastFocused=document.activeElement;
  bgInert(true);
  $('#scrim').classList.add('show');$('#editor').classList.add('open');
  $('#edClose').focus();
  setTimeout(()=>{if(!$('#editor').contains(document.activeElement))$('#edClose').focus();},60);
}
function def(v,d){return (v===null||v===undefined||isNaN(v))?d:v;}
let lastFocused=null;
function bgInert(on){['.app','.fabs'].forEach(s=>{const n=document.querySelector(s);if(n){if(on)n.setAttribute('inert','');else n.removeAttribute('inert');}});}
function closeEditor(){$('#scrim').classList.remove('show');$('#editor').classList.remove('open');
  document.body.style.overflow='';cur=null;
  bgInert(false);
  if(lastFocused&&lastFocused.focus){lastFocused.focus();}lastFocused=null;}
$('#edClose').onclick=closeEditor;$('#scrim').onclick=closeEditor;

function syncFav(){const on=cur&&!cur._blank&&favs.has(cur._i);const b=$('#edFav');
  b.classList.toggle('on',!!on);setHeart(b,!!on);}
$('#edFav').onclick=()=>{if(!cur||cur._blank)return;toggleFav(cur._i);syncFav();
  document.querySelectorAll(`.fav[data-i="${cur._i}"]`).forEach(b=>{const on=favs.has(cur._i);b.classList.toggle('on',on);setHeart(b,on);});};

//// ---------- EDITOR PANELS (tabs + horizontal swipe) ----------
const SLIDER_BY_K=Object.fromEntries(NUM_SLIDERS.map(s=>[s.k,s]));
const ED_PANELS=[
  {id:'base',  label:'Base'},
  {id:'light', label:'Lumière', sliders:['highlights','shadows','clarity'], segs:['dr']},
  {id:'color', label:'Couleur', sliders:['color','wbRed','wbBlue'], segs:['chrome','chromeBlue']},
  {id:'detail',label:'Détail',  sliders:['sharpness','noiseReduction'], segs:['grain','grainSize']},
  {id:'recipe',label:'Recette'},
];
let curTab=0;

function makeSlider(s){
  const row=el('div','sld');
  row.innerHTML=`<div class="sld-top"><label for="i_${s.k}">${s.label}</label><span class="sld-val" id="v_${s.k}" aria-hidden="true"></span></div>
    <div class="range"><div class="track"></div><div class="midmark"></div><div class="fill" id="f_${s.k}"></div>
    <input type="range" min="${s.min}" max="${s.max}" step="${s.step}" value="${vals[s.k]}" id="i_${s.k}"></div>`;
  const inp=row.querySelector('input');
  inp.addEventListener('input',()=>{vals[s.k]=parseFloat(inp.value);updSlider(s);paintLook();});
  return row;
}
function makeSeg(key){
  if(key==='dr')        return seg('Plage dynamique',['DR100','DR200','DR400','Auto'],vals.dr,v=>{vals.dr=v;fillPanel('light');paintLook();},true);
  if(key==='grain')     return segLv('Grain',vals.grain,v=>{vals.grain=v;fillPanel('detail');paintLook();});
  if(key==='grainSize') return vals.grain!=='Off'?seg('Taille du grain',['Small','Large'],vals.grainSize,v=>{vals.grainSize=v;fillPanel('detail');paintLook();}):null;
  if(key==='chrome')    return vals.mono?null:segLv('Color Chrome Effect',vals.colorChrome,v=>{vals.colorChrome=v;fillPanel('color');paintLook();});
  if(key==='chromeBlue')return vals.mono?null:segLv('Color Chrome Blue',vals.colorChromeBlue,v=>{vals.colorChromeBlue=v;fillPanel('color');paintLook();});
  return null;
}
function basePickEl(){
  const w=el('div','basepick');w.setAttribute('role','radiogroup');w.setAttribute('aria-label','Simulation de base');w.setAttribute('data-rg','base');
  BASES.forEach(b=>{const btn=el('button');btn.textContent=b;const on=vals.base===b;if(on)btn.classList.add('on');
    btn.setAttribute('role','radio');btn.setAttribute('aria-checked',on?'true':'false');btn.setAttribute('data-rv',b);
    btn.onclick=()=>{vals.base=b;vals.mono=/acros|mono|sepia/i.test(b);fillPanel('base');fillPanel('color');paint();};w.appendChild(btn);});
  return w;
}
function recipeEl(){
  const f=document.createDocumentFragment();
  const wb=el('div','wbline');wb.innerHTML=`<span>Balance des blancs</span><b id="wbVal">${esc(wbText())}</b>`;f.appendChild(wb);
  if(cur&&!cur._blank){
    const h=el('div','sec-h');h.innerHTML='Recette d\'origine <span class="ln"></span>';f.appendChild(h);
    const rb=el('div','rawbox');rb.id='rawBox';rb.textContent=(cur.raw||'').trim()||'—';f.appendChild(rb);
  }
  return f;
}
function fillPanel(id){
  const cfg=ED_PANELS.find(p=>p.id===id);const host=document.getElementById('panel-'+id);
  host.innerHTML='';
  if(id==='base')        host.appendChild(basePickEl());
  else if(id==='recipe') host.appendChild(recipeEl());
  else{
    (cfg.sliders||[]).forEach(k=>host.appendChild(makeSlider(SLIDER_BY_K[k])));
    (cfg.segs||[]).forEach(key=>{const e=makeSeg(key);if(e)host.appendChild(e);});
  }
  host.querySelectorAll('[role=radiogroup]').forEach(wireRadios);
  (cfg.sliders||[]).forEach(k=>updSlider(SLIDER_BY_K[k]));
}
function buildTabs(){
  const t=$('#edTabs');t.innerHTML='';
  ED_PANELS.forEach((p,i)=>{const b=el('button','tab');b.textContent=p.label;b.setAttribute('role','tab');b.dataset.i=i;
    b.setAttribute('aria-controls','panel-'+p.id);b.onclick=()=>setTab(i);t.appendChild(b);});
}
function highlightTab(i){
  document.querySelectorAll('#edTabs .tab').forEach((b,j)=>{const on=j===i;b.classList.toggle('on',on);
    b.setAttribute('aria-selected',on?'true':'false');b.tabIndex=on?0:-1;});
}
function setTab(i,smooth=true){
  i=clamp(i,0,ED_PANELS.length-1);curTab=i;
  const p=$('#edPanels');const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  p.scrollTo({left:i*p.clientWidth,behavior:(smooth&&!reduce)?'smooth':'auto'});
  highlightTab(i);
}
function buildEditorPanels(){
  buildTabs();
  ED_PANELS.forEach(p=>fillPanel(p.id));
  setTab(0,false);
}
// sync active tab while swiping; arrow-key tab navigation
(function initTabs(){
  const p=$('#edPanels');let raf;
  p.addEventListener('scroll',()=>{if(raf)return;raf=requestAnimationFrame(()=>{raf=null;
    const i=Math.round(p.scrollLeft/p.clientWidth);if(i!==curTab){curTab=i;highlightTab(i);}});});
  $('#edTabs').addEventListener('keydown',e=>{
    if(e.key==='ArrowRight'){e.preventDefault();setTab(curTab+1);}
    else if(e.key==='ArrowLeft'){e.preventDefault();setTab(curTab-1);}
    else return;
    const b=document.querySelector('#edTabs .tab.on');if(b)b.focus();
  });
})();
function updSlider(s){
  const v=vals[s.k];const span=$('#v_'+s.k);
  const txt=(v>0?'+':'')+ (Number.isInteger(v)?v:v.toFixed(1));
  span.textContent=txt;
  span.className='sld-val '+(v>0?'pos':v<0?'neg':'zero');
  $('#i_'+s.k).setAttribute('aria-valuetext',txt);   // a11y: announce the signed value
  const pct=(v-s.min)/(s.max-s.min)*100, mid=(0-s.min)/(s.max-s.min)*100;
  const f=$('#f_'+s.k);
  if(v>=0){f.style.left=mid+'%';f.style.width=(pct-mid)+'%';f.style.background='var(--pos)';}
  else{f.style.left=pct+'%';f.style.width=(mid-pct)+'%';f.style.background='var(--neg)';}
  $('#i_'+s.k).parentNode.querySelector('.midmark').style.left=mid+'%';
}
function seg(label,opts,val,fn,acc){
  const row=el('div','seg-row');row.innerHTML=`<label>${label}</label>`;
  const s=el('div','seg');s.setAttribute('role','radiogroup');s.setAttribute('aria-label',label);s.setAttribute('data-rg',label);
  opts.forEach(o=>{const b=el('button');b.textContent=o;const on=o===val;if(on){b.classList.add('on');if(acc)b.classList.add('acc');}
    b.setAttribute('role','radio');b.setAttribute('aria-checked',on?'true':'false');b.setAttribute('data-rv',o);b.onclick=()=>fn(o);s.appendChild(b);});
  row.appendChild(s);return row;
}
function segLv(label,val,fn){
  const row=el('div','seg-row');row.innerHTML=`<label>${label}</label>`;
  const s=el('div','seg');s.setAttribute('role','radiogroup');s.setAttribute('aria-label',label);s.setAttribute('data-rg',label);
  LV.forEach(o=>{const b=el('button');b.textContent=LVfr[o];const on=o===val;if(on)b.classList.add('on');
    b.setAttribute('role','radio');b.setAttribute('aria-checked',on?'true':'false');b.setAttribute('data-rv',o);b.onclick=()=>fn(o);s.appendChild(b);});
  row.appendChild(s);return row;
}

//// ---------- EDITOR PREVIEW (canvas, full film engine) ----------
const pvCanvas=$('#pvCanvas');
function paint(){paintPreview();syncWbReadout();$('#btnExport').hidden=!userImg;}
function syncWbReadout(){const wv=$('#wbVal');if(wv)wv.textContent=wbText();}
let pvScheduled=false;
function paintPreview(){
  if(pvScheduled)return;pvScheduled=true;
  requestAnimationFrame(()=>{pvScheduled=false;
    // render at the source photo's own aspect ratio so the whole image shows (contain)
    const src=userImg||baseImg;
    let w=src.naturalWidth||3, h=src.naturalHeight||2, m=Math.max(w,h), cap=1100;
    if(m>cap){const s=cap/m;w=Math.round(w*s);h=Math.round(h*s);}
    renderRecipe(src, vals, pvCanvas, w, h);
    syncWbReadout();});
}
// slider/segment handlers call paintLook(); keep the name, route to the canvas render.
const paintLook=paintPreview;
function wbText(){
  let t=cur&&cur.whiteBalance?cur.whiteBalance:'Auto';
  let sh=[];if(vals.wbRed)sh.push('R'+(vals.wbRed>0?'+':'')+vals.wbRed);if(vals.wbBlue)sh.push('B'+(vals.wbBlue>0?'+':'')+vals.wbBlue);
  return t+(sh.length?'  ('+sh.join(' ')+')':'');
}

$('#upload').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;const rd=new FileReader();
  rd.onload=()=>{const im=new Image();im.onload=()=>{userImg=im;paint();};im.src=rd.result;};
  rd.readAsDataURL(f);
});

//// foot buttons
$('#btnReset').onclick=()=>{if(cur)openEditor(cur,cur._blank);toast('Réglages réinitialisés');};

//// EXPORT (bake the current look into the uploaded photo)
function slugify(s){return (s||'recette').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'')
  .replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,40)||'recette';}
function uniqueName(){
  const d=new Date();const p=n=>String(n).padStart(2,'0');
  const stamp=`${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}-${p(d.getHours())}${p(d.getMinutes())}${p(d.getSeconds())}`;
  const rnd=Math.floor(1000+ (Date.now()%9000));
  return `fuji_${slugify(cur&&cur.name)}_${slugify(vals.base)}_${stamp}-${rnd}.jpg`;
}
async function exportImage(){
  if(!userImg)return;
  const btn=$('#btnExport');btn.classList.add('busy');
  try{
    let w=userImg.naturalWidth||1200,h=userImg.naturalHeight||800;
    const maxW=2600;if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
    const cv=document.createElement('canvas');
    renderRecipe(userImg, vals, cv, w, h);   // full film engine, native resolution
    const name=uniqueName();
    await new Promise(res=>cv.toBlob(b=>{
      if(!b){toast('Export impossible');return res();}
      const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=name;
      document.body.appendChild(a);a.click();a.remove();
      setTimeout(()=>URL.revokeObjectURL(a.href),4000);
      toast('Exporté · '+name);res();
    },'image/jpeg',0.92));
  }catch(e){toast('Export impossible');}
  finally{btn.classList.remove('busy');}
}
$('#btnExport').onclick=exportImage;

//// new recipe
$('#fabNew').onclick=()=>{openEditor({_blank:true,name:'Nouvelle recette',base:'Provia',mono:false,raw:''},true);};

//// toast
let tT;function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(tT);tT=setTimeout(()=>t.classList.remove('show'),1800);}

// close on Esc
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&cur)closeEditor();});
</script>
